<!DOCTYPE html>
<!--
  asset_browser.html - Cat-Annihilation one-stop asset browser.

  Purpose:
    View every game asset in 3D: characters (cats + dogs), environment props,
    weapons, projectiles. Toggle skeleton / wireframe / raw-vs-rigged, play
    procedural animations, see the Meshy prompt used to generate each, and
    diagnose rigging failures per-cat. Swap the viewer background so dark-fur
    cats don't disappear against the default dark UI.

  History:
    Evolved from identify_cats.html (v1 = file-to-slot matcher, v2 = asset
    viewer with prompts, v3 = browser with animations + rig diagnostics).
    This is v4: repurposed from cat-only to every asset under assets/models/.

  How to use:
    1. Launch a static server from the cat-annihilation project root:
         cd cat-annihilation
         python -m http.server 8000
    2. Open http://localhost:8000/scripts/asset_browser.html
    3. Pick a category tab (Cats / Dogs / Props) in the left panel.
    4. Click any asset row. 3D model loads in the center, metadata and
       prompt (when available) appear on the right.
    5. Viewer toolbar toggles: source (rigged/raw), display (skeleton /
       wireframe / axes), camera (spin / reset), animation (idle / sit /
       stand / walk / run), background color.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cat-Annihilation - Asset Browser</title>
<style>
  :root {
    --bg: #15181f;
    --panel: #1e222c;
    --panel-hi: #2a303c;
    --panel-lo: #171a21;
    --text: #e4e7ee;
    --muted: #8890a0;
    --accent: #63b3ed;
    --mist: #4299e1;
    --storm: #d4af37;
    --ember: #dd6b20;
    --frost: #81e6d9;
    --neutral: #a0aec0;
    --ok: #48bb78;
    --warn: #f6ad55;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font: 13px/1.45 system-ui, sans-serif; overflow: hidden; }
  .app { display: grid; grid-template-columns: 280px 1fr 360px; height: 100vh; }
  .panel { background: var(--panel); overflow-y: auto; }
  .panel.left  { border-right: 1px solid #000; }
  .panel.right { border-left:  1px solid #000; }
  .panel h2 { font-size: 12px; margin: 0; color: var(--accent); letter-spacing: 0.6px; text-transform: uppercase; }

  /* --- LEFT: category tabs + roster --- */
  .category-tabs { display: flex; background: var(--panel-lo); border-bottom: 1px solid #000; }
  .category-tabs button {
    flex: 1; padding: 10px 4px; background: transparent; color: var(--muted);
    border: 0; border-bottom: 2px solid transparent; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
  }
  .category-tabs button:hover { color: var(--text); }
  .category-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

  .roster-section { padding: 10px 12px 4px; }
  .roster-section h3 {
    font-size: 11px; margin: 12px 0 6px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  }
  .roster-section h3 .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .roster-section h3.MistClan  .dot { background: var(--mist); }
  .roster-section h3.StormClan .dot { background: var(--storm); }
  .roster-section h3.EmberClan .dot { background: var(--ember); }
  .roster-section h3.FrostClan .dot { background: var(--frost); }
  .roster-section h3.None      .dot { background: var(--neutral); }

  .asset-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; margin-bottom: 3px; border-radius: 4px;
    cursor: pointer; user-select: none;
    border-left: 3px solid transparent;
    background: var(--panel-hi);
    transition: background 0.1s, border-color 0.1s;
  }
  .asset-row:hover { background: #343b48; }
  .asset-row.active { background: #2b4c6f; border-left-color: var(--accent); }
  .asset-row.MistClan  { border-left-color: var(--mist); }
  .asset-row.StormClan { border-left-color: var(--storm); }
  .asset-row.EmberClan { border-left-color: var(--ember); }
  .asset-row.FrostClan { border-left-color: var(--frost); }
  .asset-row .name { font-weight: 600; font-size: 12px; }
  .asset-row .role { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .header-bar {
    position: sticky; top: 0; z-index: 2; background: var(--panel);
    padding: 12px; border-bottom: 1px solid #000;
  }
  .header-bar .sub { color: var(--muted); font-size: 11px; margin-top: 3px; }

  /* --- CENTER: 3D viewer --- */
  #viewer { position: relative; background: #0c0e14; overflow: hidden; }
  #viewer canvas { display: block; }

  .viewer-toolbar {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    pointer-events: none;
    z-index: 5;
  }
  .viewer-toolbar .group {
    display: flex; gap: 4px; pointer-events: auto;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
    padding: 4px; border-radius: 5px;
  }
  .viewer-toolbar button {
    background: transparent; color: var(--text); border: 1px solid transparent;
    border-radius: 3px; padding: 4px 8px; font-size: 11px; cursor: pointer;
  }
  .viewer-toolbar button:hover { background: rgba(255,255,255,0.08); }
  .viewer-toolbar button.active {
    background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600;
  }
  .viewer-toolbar button.incomplete { color: var(--warn); border-color: var(--warn); }
  .viewer-toolbar button.disabled { opacity: 0.35; pointer-events: none; }
  .viewer-toolbar .label { color: var(--muted); font-size: 10px; padding: 4px 6px; letter-spacing: 0.5px; text-transform: uppercase; }

  /* Background-color swatch buttons use their actual target color so you
     can see what you're picking at a glance. */
  .viewer-toolbar .bg-swatch {
    width: 22px; height: 22px; padding: 0; border: 2px solid transparent;
    border-radius: 4px; cursor: pointer;
  }
  .viewer-toolbar .bg-swatch.active { border-color: var(--accent); box-shadow: 0 0 0 1px #000 inset; }

  .viewer-status {
    position: absolute; bottom: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
    color: var(--muted); font-size: 11px; font-family: ui-monospace, monospace;
  }
  .viewer-status > div {
    background: rgba(0,0,0,0.55); padding: 4px 8px; border-radius: 4px;
    pointer-events: auto;
  }

  .viewer-empty {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); pointer-events: none;
  }
  .viewer-empty h1 { font-size: 24px; margin: 0 0 8px; color: var(--text); font-weight: 500; }

  /* --- RIGHT: details --- */
  .details-body { padding: 12px; }
  .details-body h3 {
    font-size: 11px; margin: 16px 0 6px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  }
  .details-body h3:first-child { margin-top: 0; }
  .details-body .kv { font-size: 12px; margin-bottom: 4px; }
  .details-body .kv .k { color: var(--muted); display: inline-block; min-width: 90px; }
  .details-body .kv .v { color: var(--text); font-family: ui-monospace, monospace; word-break: break-word; }

  .chip { display: inline-block; padding: 2px 8px; font-size: 10px; border-radius: 10px; margin-right: 4px; margin-bottom: 3px; background: var(--panel-hi); color: var(--text); }
  .chip.MistClan  { background: #2d4e77; }
  .chip.StormClan { background: #6b5327; }
  .chip.EmberClan { background: #7a3d1a; }
  .chip.FrostClan { background: #265e55; }
  .chip.None      { background: #4a5060; }

  .prompt-editor textarea {
    width: 100%; min-height: 220px; background: #0a0d13; color: var(--text);
    border: 1px solid #2a303c; border-radius: 3px; padding: 8px;
    font: 11px/1.5 ui-monospace, monospace; resize: vertical;
  }
  .prompt-editor .row { display: flex; gap: 6px; margin-top: 6px; }
  .prompt-editor button {
    flex: 1; padding: 6px 8px; font-size: 11px; font-weight: 600;
    background: var(--panel-hi); color: var(--text); border: 0; border-radius: 3px; cursor: pointer;
  }
  .prompt-editor button.primary { background: var(--accent); color: #000; }
  .prompt-editor button:hover { filter: brightness(1.2); }
  .prompt-editor .edited-label { color: var(--warn); font-size: 10px; margin-left: auto; }

  .shop-item, .training-item, .quest-item {
    background: var(--panel-lo); padding: 6px 8px; margin-bottom: 4px; border-radius: 3px; font-size: 11px;
  }
  .shop-item .name, .training-item .name, .quest-item .name { font-weight: 600; }
  .shop-item .price { float: right; color: var(--accent); font-family: ui-monospace, monospace; }
  .shop-item .desc, .training-item .desc { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .training-item .cost { float: right; color: var(--accent); font-family: ui-monospace, monospace; font-size: 11px; }

  /* ---- Rigging report ---- */
  .rig-report { background: var(--panel-lo); border-radius: 4px; padding: 8px; font-size: 11px; }
  .rig-report .coverage { font-weight: 600; margin-bottom: 6px; }
  .rig-report .coverage.ok   { color: var(--ok); }
  .rig-report .coverage.warn { color: var(--warn); }
  .rig-report .coverage.bad  { color: #fc8181; }
  .rig-report .bone-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px 8px;
    font-family: ui-monospace, monospace; font-size: 10.5px;
    margin-bottom: 6px;
  }
  .rig-report .bone.ok      { color: var(--ok); }
  .rig-report .bone.missing { color: #fc8181; text-decoration: line-through; }
  .rig-report .extras { color: var(--muted); font-family: ui-monospace, monospace; font-size: 10.5px; }
  .rig-report .note   { color: var(--warn); font-size: 11px; margin-top: 6px; padding: 6px 8px; background: #3a2d18; border-left: 2px solid var(--warn); border-radius: 2px; }
  .rig-report .actions { display: flex; gap: 6px; margin-top: 8px; }
  .rig-report .actions button { flex: 1; padding: 5px; font-size: 11px; background: var(--panel-hi); color: var(--text); border: 0; border-radius: 3px; cursor: pointer; }
  .rig-report .actions button:hover { filter: brightness(1.2); }

  /* ---- Bone sandbox ---- */
  .bone-sandbox { background: var(--panel-lo); border-radius: 4px; padding: 8px; font-size: 11px; }
  .bone-sandbox .row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .bone-sandbox select {
    flex: 1; padding: 4px 6px; background: var(--panel-hi); color: var(--text);
    border: 1px solid #000; border-radius: 3px; font: 11px ui-monospace, monospace;
  }
  .bone-sandbox button {
    padding: 4px 8px; font-size: 11px; background: var(--panel-hi); color: var(--text);
    border: 0; border-radius: 3px; cursor: pointer;
  }
  .bone-sandbox button:hover { filter: brightness(1.2); }
  .bone-sandbox button.primary { background: var(--accent); color: #000; font-weight: 600; }
  .bone-sandbox .slider-row {
    display: grid; grid-template-columns: 20px 1fr 50px; gap: 6px; align-items: center; margin-top: 4px;
  }
  .bone-sandbox .slider-row input[type=range] { width: 100%; }
  .bone-sandbox .slider-row .axis { font-family: ui-monospace, monospace; font-weight: 600; }
  .bone-sandbox .slider-row .val { font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted); text-align: right; }
  .bone-sandbox .preset { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .bone-sandbox .preset button { flex: 1; font-size: 10px; padding: 3px 4px; }
  .bone-sandbox .hint { color: var(--muted); font-size: 10px; margin-top: 6px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ok); color: #000; padding: 10px 16px; border-radius: 4px;
    font-weight: 600; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a303c; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4250; }
</style>
</head>
<body>

<div class="app">

  <!-- LEFT: category tabs + roster -->
  <div class="panel left">
    <div class="category-tabs" id="categoryTabs">
      <button data-category="cats"  class="active">Cats</button>
      <button data-category="dogs">Dogs</button>
      <button data-category="props">Props</button>
      <button data-category="rigs"  title="Canonical anatomically-correct skeletons (no mesh)">Rigs</button>
    </div>
    <div class="header-bar">
      <h2 id="categoryHeader">Cats <span id="rosterCount" style="float:right;color:var(--muted);font-weight:400;"></span></h2>
      <div class="sub" id="categorySub">17 clan cats + player</div>
    </div>
    <div id="roster"></div>
  </div>

  <!-- CENTER: 3D viewer -->
  <div id="viewer">
    <div class="viewer-toolbar">
      <div class="group" id="sourceGroup">
        <span class="label">Source</span>
        <button id="btnRigged" class="active">Rigged</button>
        <button id="btnRaw">Raw</button>
      </div>
      <div class="group">
        <span class="label">Display</span>
        <button id="btnSkeleton">Skeleton</button>
        <button id="btnWireframe">Wireframe</button>
        <button id="btnWeights" title="Color mesh vertices by dominant bone influence - diagnoses weight leakage">Weights</button>
        <button id="btnAxes">Axes</button>
      </div>
      <div class="group">
        <span class="label">Camera</span>
        <button id="btnAutoRotate">Spin</button>
        <button id="btnReset">Reset</button>
      </div>
      <div class="group" id="animGroup">
        <span class="label">Animate</span>
        <button data-anim="idle"    class="active">Idle</button>
        <button data-anim="sitDown">Sit Down</button>
        <button data-anim="layDown">Lay Down</button>
        <button data-anim="standUp">Stand Up</button>
        <button data-anim="walk">Walk</button>
        <button data-anim="run">Run</button>
        <button id="btnPauseAnim" title="Pause the animation at the current frame so you can grab a screenshot. Click again to resume.">Pause</button>
      </div>
      <div class="group" id="bgGroup">
        <span class="label">Background</span>
        <!-- Inline styles on purpose: each swatch must show its own color. -->
        <button class="bg-swatch active" data-bg="0x0c0e14" style="background:#0c0e14"                    title="Default (dark)"></button>
        <button class="bg-swatch"        data-bg="0x000000" style="background:#000000"                    title="Black"></button>
        <button class="bg-swatch"        data-bg="0x2a303c" style="background:#2a303c"                    title="Dark gray"></button>
        <button class="bg-swatch"        data-bg="0x6b7280" style="background:#6b7280"                    title="Mid gray"></button>
        <button class="bg-swatch"        data-bg="0xe5e7eb" style="background:#e5e7eb"                    title="Light gray"></button>
        <button class="bg-swatch"        data-bg="0xffffff" style="background:#ffffff"                    title="White"></button>
        <button class="bg-swatch"        data-bg="0x1e3a5f" style="background:#1e3a5f"                    title="Studio blue"></button>
        <button class="bg-swatch"        data-bg="0x3d2418" style="background:#3d2418"                    title="Warm brown"></button>
      </div>
    </div>
    <div class="viewer-empty" id="viewerEmpty">
      <h1>Asset Browser</h1>
      <div>Pick an asset on the left to begin.</div>
    </div>
    <div class="viewer-status">
      <div id="statusFile">-</div>
      <div id="statusMeta">drag to rotate - scroll to zoom - shift-drag to pan</div>
    </div>
  </div>

  <!-- RIGHT: details -->
  <div class="panel right">
    <div class="header-bar">
      <h2>Details</h2>
      <div class="sub" id="detailsSub">Select an asset</div>
    </div>
    <div class="details-body" id="details"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ===========================================================================
// ASSET REGISTRIES
// ===========================================================================
//
// Each category has its own registry. The browser treats them uniformly via
// a `kind` field ('cat' | 'dog' | 'prop') so the renderer can branch on
// features (skeleton report only makes sense for characters, etc.).

// --- Cats: canonical 17-slot roster matching assets/models/cats/<id>.glb
//     and assets/npcs/npcs.json (via npcId).
const CATS = [
  { kind: 'cat', id: 'mist_leader',    clan: 'MistClan',  role: 'Leader',    npcId: 'mist_mistheart' },
  { kind: 'cat', id: 'mist_mentor',    clan: 'MistClan',  role: 'Mentor',    npcId: 'mist_shadowwhisker' },
  { kind: 'cat', id: 'mist_merchant',  clan: 'MistClan',  role: 'Merchant',  npcId: 'mist_fogpaw' },
  { kind: 'cat', id: 'storm_leader',   clan: 'StormClan', role: 'Leader',    npcId: 'storm_stormstar' },
  { kind: 'cat', id: 'storm_mentor',   clan: 'StormClan', role: 'Mentor',    npcId: 'storm_thunderstrike' },
  { kind: 'cat', id: 'storm_trainer',  clan: 'StormClan', role: 'Trainer',   npcId: 'storm_lightningclaw' },
  { kind: 'cat', id: 'storm_trader',   clan: 'StormClan', role: 'Merchant',  npcId: 'storm_stormtrader' },
  { kind: 'cat', id: 'ember_leader',   clan: 'EmberClan', role: 'Leader',    npcId: 'ember_blazestar' },
  { kind: 'cat', id: 'ember_mentor',   clan: 'EmberClan', role: 'Mentor',    npcId: 'ember_flamefur' },
  { kind: 'cat', id: 'ember_merchant', clan: 'EmberClan', role: 'Merchant',  npcId: 'ember_ashwhisker' },
  { kind: 'cat', id: 'frost_leader',   clan: 'FrostClan', role: 'Leader',    npcId: 'frost_winterstar' },
  { kind: 'cat', id: 'frost_mentor',   clan: 'FrostClan', role: 'Mentor',    npcId: 'frost_icepelt' },
  { kind: 'cat', id: 'frost_healer',   clan: 'FrostClan', role: 'Healer',    npcId: 'frost_snowpaw' },
  { kind: 'cat', id: 'wanderer',       clan: 'None',      role: 'QuestGiver', npcId: 'neutral_wanderer' },
  { kind: 'cat', id: 'elder',          clan: 'None',      role: 'Mentor',     npcId: 'neutral_elder' },
  { kind: 'cat', id: 'scout',          clan: 'None',      role: 'QuestGiver', npcId: 'neutral_scout' },
  { kind: 'cat', id: 'player',         clan: 'None',      role: 'Player',     npcId: null }
];

// --- Dogs: enemy variants. Currently unrigged (live in meshy_raw_dogs/).
//     The 'raw' source points there; 'rigged' will point to a future
//     rigged-dogs folder once rig_batch runs with -Species dog.
const DOGS = [
  { kind: 'dog', id: 'dog_regular', clan: 'Enemy', role: 'Grunt',   name: 'Mixed-Breed Mutt',   stats: 'HP 40 - Speed normal - Damage low' },
  { kind: 'dog', id: 'dog_big',     clan: 'Enemy', role: 'Tank',    name: 'English Bulldog',    stats: 'HP 120 - Speed slow - Damage high' },
  { kind: 'dog', id: 'dog_fast',    clan: 'Enemy', role: 'Scout',   name: 'Italian Greyhound',  stats: 'HP 25 - Speed very fast - Damage low' },
  { kind: 'dog', id: 'dog_boss',    clan: 'Enemy', role: 'Boss',    name: 'Great Dane Alpha',   stats: 'HP 600 - Speed moderate - Damage massive' }
];

// --- Props: environment + weapons + projectiles. Grouped by subcategory so
//     the left panel renders as a structured list rather than 37 rows.
const PROP_GROUPS = {
  'Trees':         ['tree_oak', 'tree_oak_autumn', 'tree_pine', 'tree_pine_frost', 'tree_dead_burnt', 'ember_oak_ancient', 'storm_dead_pine'],
  'Rocks / Stones': ['rock_small', 'rock_boulder', 'rock_cluster', 'rock_river_mossy', 'mist_flat_stone', 'storm_boulder_lichen', 'storm_cairn', 'ember_shrine_stone'],
  'Vegetation':    ['grass_fern_tuft', 'mist_cattails', 'frost_shrub_hoar', 'log_fallen', 'mist_log_mossy', 'stump'],
  'Frost / Ice':   ['frost_ice_crystal', 'frost_snow_drift'],
  'Landmarks':     ['landmark_ancient_oak', 'landmark_ice_spire', 'landmark_moonlit_falls', 'landmark_thunder_peak'],
  'Other':         ['campfire'],
  'Weapons':       ['weapon_sword', 'weapon_dagger', 'weapon_bow', 'weapon_staff'],
  'Projectiles':   ['projectile_arrow', 'projectile_orb_air', 'projectile_orb_earth', 'projectile_orb_fire', 'projectile_orb_water']
};
const PROPS = Object.entries(PROP_GROUPS).flatMap(([group, ids]) =>
  ids.map(id => ({ kind: 'prop', id, group, role: group, clan: 'None' }))
);

// --- Canonical skeletons: anatomically-correct bone layouts for each species
//     built programmatically (no GLB). Lets us validate animation quality
//     BEFORE worrying about mesh binding. If Walk looks like a cat walk on
//     the standalone skeleton, then any rigging failure downstream is a
//     mesh-mapping problem, not a bone-motion problem.
const CANONICAL_RIGS = [
  { kind: 'rig', id: 'canonical_cat', role: 'Cat skeleton',  clan: 'None', species: 'cat' },
  { kind: 'rig', id: 'canonical_dog', role: 'Dog skeleton',  clan: 'None', species: 'dog' }
];

// ===========================================================================
// MESHY PROMPTS
// ===========================================================================
// Prefix/suffix constant across every asset; only the middle chunk varies.
// Factoring means a global tweak (e.g. poly cap bump) is one edit.

const PROMPT_PREFIX_CAT = 'Small domestic house cat, approximately 10 pounds and 18 inches long, quadruped, standing naturally on all four paws with weight balanced evenly, body parallel to the ground, fully furred short-hair coat, ';
const PROMPT_SUFFIX_CAT = ', realistic feline proportions matching a normal pet cat - not a lion, not a panther, not a cougar, just a regular house cat. Rigged T-pose, symmetric, full body, no base, game-ready topology under 300,000 polygons, clean quad mesh, PBR textures.';

const PROMPT_PREFIX_DOG = '';
const PROMPT_SUFFIX_DOG = ', realistic canine proportions matching the real breed, quadruped, standing naturally on all four paws with weight balanced evenly, body parallel to the ground, T-pose, symmetric, full body, no base, game-ready topology under 300,000 polygons, clean quad mesh, PBR textures.';

// Cat prompt details (middle chunk only - PREFIX + this + SUFFIX).
const CAT_PROMPTS = {

// ===========================================================================
// CANONICAL SKELETON BUILDERS
// ===========================================================================
//
// Build a bone hierarchy for a real cat/dog directly in three.js, anatomy-
// correct, no mesh involved. Bone names match what rig_quadruped.py produces
// on the mesh side so the same animation clips drive either. Positions are
// LOCAL offsets from parent (not world coords); three.js composes them.
//
// Reference frame:
//   +X = forward (head)    +Y = up    +Z = right side (L = +Z, R = -Z)
//
// Cat proportions come from real-animal measurements, not Meshy's output:
//   Total body length (nose to base of tail): ~45cm
//   Shoulder height: 25cm   Hip height: 22cm
//   Tail length: 30cm in 4 segments   Leg segments: upper 8cm, lower 8cm,
//   paw 6cm (stands 22cm ground-to-hip).
//
// Why local offsets: bones in three.js inherit their parent's transform.
// "Rotate the hip +30 on X" should move everything below it. Storing each
// bone as a LOCAL offset from its parent keeps the math clean and matches
// how glTF encodes skeletons.

// Real cat/dog anatomy has 7 cervical + 13 thoracic + 7 lumbar + sacrum
// + 20+ caudal vertebrae, with the LUMBAR region providing the dramatic
// back-arch you see in a sitting cat. The original rig had only one bone
// (spine_01) between hips and chest, which rigidified the back and
// prevented the sit-arch. This revised layout adds lumbar_01/lumbar_02
// between hips and spine_01 (4 flex joints pelvis->shoulders) and splits
// the neck into neck_01/neck_02 so the head can curve up during sit.
//
// Also: back legs now have a bent-knee rest pose instead of a straight
// chain. Previous rig had total back-leg length (0.22) exactly equal to
// hip height, which meant any bend during sit pulled paws off the ground
// - the leg couldn't reach. Rebalanced: thigh 0.10, shin 0.10, foot 0.04,
// paw 0.04 = 0.28 total length. Rest pose bends slightly at the knee so
// paws still touch y=0 when hips at rest height; sit pose can bend much
// deeper because there's excess leg length to absorb.
const CAT_BONE_LAYOUT = {
  // [name]: { parent, localPos [x, y, z] }   x forward, y up, z right
  root:        { parent: null,     pos: [0,     0,     0] },
  hips:        { parent: 'root',   pos: [0,     0.22,  0] },

  // Lumbar (flexible lower back). Two bones splitting what was the old
  // single spine_01. Each one can flex independently during sit to form
  // the cat's signature arched-back curve.
  lumbar_01:   { parent: 'hips',      pos: [0.04, 0.005, 0] },
  lumbar_02:   { parent: 'lumbar_01', pos: [0.04, 0.005, 0] },

  // Thoracic (upper back). spine_01 is the lower thoracic (just ahead
  // of lumbar); upper_back_01..03 add three more flex joints so the
  // UPPER back matches the lumbar flex. Previously the chain jumped
  // straight from spine_01 to chest (rigid front half). The chest
  // shoulder-mount now sits at the END of the thoracic chain.
  spine_01:       { parent: 'lumbar_02',     pos: [0.03, 0.004, 0] },
  upper_back_01:  { parent: 'spine_01',      pos: [0.03, 0.004, 0] },
  upper_back_02:  { parent: 'upper_back_01', pos: [0.03, 0.004, 0] },
  upper_back_03:  { parent: 'upper_back_02', pos: [0.03, 0.004, 0] },
  chest:          { parent: 'upper_back_03', pos: [0.04, 0.014, 0] },

  // Neck: 2 bones. User confirmed 2 is the right count for this rig.
  neck_01:     { parent: 'chest',   pos: [0.05, 0.02, 0] },
  neck_02:     { parent: 'neck_01', pos: [0.04, 0.02, 0] },
  head:        { parent: 'neck_02', pos: [0.08, 0.02, 0] },

  // Face bones: ears + jaw. Give the mesh around ears and mouth their
  // own weight regions so head rotations don't rigidly smash the face.
  // Matches rig_quadruped.py's face-bone placement so GLB rigs and the
  // canonical rig stay in sync.
  ear_L:       { parent: 'head', pos: [0.02,  0.04,  0.03] },
  ear_R:       { parent: 'head', pos: [0.02,  0.04, -0.03] },
  jaw:         { parent: 'head', pos: [0.05, -0.03,  0] },

  // Tail starts at the TOP of the rear hip (where a real cat's tail base
  // sits) and arcs backward with gentle natural droop.
  tail_01:     { parent: 'hips',    pos: [-0.05,  0.04, 0] },
  tail_02:     { parent: 'tail_01', pos: [-0.07,  0.00, 0] },
  tail_03:     { parent: 'tail_02', pos: [-0.07, -0.01, 0] },
  tail_04:     { parent: 'tail_03', pos: [-0.06, -0.02, 0] },

  // Front legs: SAME bone lengths as back legs (0.10 / 0.10 / 0.02) for
  // symmetric fold reach. Previously used 0.08 / 0.08 / 0.06 which made
  // the front leg's cosine-based reach curve diverge from the back
  // curve at mid-fold (s=0.5), causing front paws to dip 1cm below
  // ground during lay down. Now both chains have identical reach at
  // every fold scale so they stay in sync throughout sit/lay.
  //   shoulder_local.y = -0.03 keeps rest paw at y=0 (chest_rest = 0.25,
  //   shoulder = 0.22, leg length 0.22, paw at 0).
  shoulder_L:  { parent: 'chest',       pos: [0,      -0.04, 0.05] },
  upper_arm_L: { parent: 'shoulder_L',  pos: [0,      -0.10, 0] },
  lower_arm_L: { parent: 'upper_arm_L', pos: [0,      -0.10, 0] },
  paw_front_L: { parent: 'lower_arm_L', pos: [0,      -0.02, 0] },
  shoulder_R:  { parent: 'chest',       pos: [0,      -0.04, -0.05] },
  upper_arm_R: { parent: 'shoulder_R',  pos: [0,      -0.10, 0] },
  lower_arm_R: { parent: 'upper_arm_R', pos: [0,      -0.10, 0] },
  paw_front_R: { parent: 'lower_arm_R', pos: [0,      -0.02, 0] },

  // Back legs: same segment lengths and ZERO x-offsets so the fold
  // math exactly mirrors the front legs. Previous rig had +/-0.015 x
  // offsets on shin/foot simulating a forward-juts knee; those offsets
  // partially cancel the vertical drop when bones rotate, giving the
  // back legs a SHORTER effective reach than the front for the same
  // fold angles. That reach mismatch was what made front paws sink
  // below ground in lay (4cm drift at end pose). Removing x-offsets
  // sacrifices anatomical knee detail in exchange for paws-on-ground
  // symmetry - acceptable trade for our procedural rig.
  //   thigh 0.10 + shin 0.10 + paw 0.02 = 0.22 rest reach (matches front)
  thigh_L:     { parent: 'hips',    pos: [-0.02,   0,    0.05] },
  shin_L:      { parent: 'thigh_L', pos: [0,     -0.10, 0] },
  foot_L:      { parent: 'shin_L',  pos: [0,     -0.10, 0] },
  paw_back_L:  { parent: 'foot_L',  pos: [0,     -0.02, 0] },
  thigh_R:     { parent: 'hips',    pos: [-0.02,   0,   -0.05] },
  shin_R:      { parent: 'thigh_R', pos: [0,     -0.10, 0] },
  foot_R:      { parent: 'shin_R',  pos: [0,     -0.10, 0] },
  paw_back_R:  { parent: 'foot_R',  pos: [0,     -0.02, 0] }
};

// Dog proportions (grown-adult medium breed):
//   Body length ~60cm, shoulder height ~50cm. Dogs are proportionally
//   longer-legged than cats and have shorter relative tail. We scale cat
//   values and shrink the tail section.
const DOG_BONE_LAYOUT = (() => {
  const SCALE = 1.4;      // dog is ~40% larger than the cat in every dimension
  const TAIL_SCALE = 0.6; // dog tails are shorter relative to body
  const layout = {};
  for (const [name, { parent, pos }] of Object.entries(CAT_BONE_LAYOUT)) {
    const s = name.startsWith('tail_') ? TAIL_SCALE * SCALE : SCALE;
    layout[name] = { parent, pos: pos.map(v => v * s) };
  }
  return layout;
})();

function buildSkeletonHierarchy(layout) {
  const bones = {};
  // First pass: create every Bone with local position set.
  for (const [name, { pos }] of Object.entries(layout)) {
    const bone = new THREE.Bone();
    bone.name = name;
    bone.position.set(pos[0], pos[1], pos[2]);
    bones[name] = bone;
  }
  // Second pass: wire up parents. The root bone has no parent; everything
  // else gets added as a child of its named parent. Root gets returned as
  // the entry point so the caller can scene.add(root).
  let rootBone = null;
  for (const [name, { parent }] of Object.entries(layout)) {
    if (parent) {
      bones[parent].add(bones[name]);
    } else {
      rootBone = bones[name];
    }
  }
  return { rootBone, bones };
}

// Joint markers: small spheres at each bone's origin so the rig renders as
// more than just thin lines. Helps when we're inspecting a standalone rig
// and need to see where each joint actually sits in 3D space.
function addJointMarkers(bones, scene, tintByDepth = true) {
  const markers = [];
  const tmpColor = new THREE.Color();
  const depthCache = new Map(); // bone -> depth-from-root
  function depthOf(bone) {
    if (depthCache.has(bone)) return depthCache.get(bone);
    let d = 0; let b = bone;
    while (b.parent && b.parent.isBone) { d++; b = b.parent; }
    depthCache.set(bone, d); return d;
  }
  const geo = new THREE.SphereGeometry(0.015, 8, 6);
  for (const bone of Object.values(bones)) {
    // Tint by depth so root is cool-blue, leaf paws are warm. Makes the
    // hierarchy readable at a glance when the skeleton is on its own.
    if (tintByDepth) {
      const hue = 0.55 - (depthOf(bone) * 0.08);
      tmpColor.setHSL(Math.max(0, Math.min(1, hue)), 0.6, 0.6);
    } else {
      tmpColor.setRGB(1, 1, 1);
    }
    const mat = new THREE.MeshBasicMaterial({ color: tmpColor.getHex() });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.name = `joint_${bone.name}`;
    bone.add(mesh); // parent to bone so joint follows bone transforms
    markers.push(mesh);
  }
  return markers;
}

  try {
    const current = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (current) return current;
    // Migrate from v3 (identify_cats era): carry over promptEdits at minimum.
    const v3 = JSON.parse(localStorage.getItem('catAnnihilation.identifier.v3'));
    if (v3) {
      return {
        promptEdits: v3.promptEdits || {},
        toggles: v3.toggles || { rigged: true, skeleton: false, wireframe: false, axes: false, autoRotate: false },
        category: 'cats',
        selectedId: v3.selectedId || null,
        bg: 0x0c0e14
      };
    }
  } catch { /* fall through */ }
  return {
    promptEdits: {},
    toggles: { rigged: true, skeleton: false, wireframe: false, weights: false, axes: false, autoRotate: false },
    category: 'cats',
    selectedId: null,
    bg: 0x0c0e14
  };
}

// ===========================================================================
// RIGGING DIAGNOSTIC (cats only)
// ===========================================================================
//
// Meshy's outputs vary: some cats T-pose, others come out sitting because
// Meshy's neutral pose is under-constrained. rig_quadruped.py places bones
// via AABB ratios which only works for horizontal-standing meshes. A sitting
// cat's AABB is ~cubic, so bones land in anatomically wrong places. Also,
// Blender's heat-diffusion weighting can fail per-bone without aborting the
// export, leaving bones with zero influence (or no influence at all if they
// got pruned).
//
// This engine inspects the loaded glTF and surfaces:
//   * Which expected Blender bones are present / missing
//   * Unexpected bones (often Meshy's auto-rig surviving the strip)
//   * Skinned-mesh count + unskinned-vertex count
//   * BBox aspect ratio -> heuristic pose diagnosis
//   * Any baked animation clips in the GLB (shouldn't exist)
// Runs only for kind === 'cat'; dogs and props skip this step.

const EXPECTED_BONES_CAT = [
  'root', 'hips',
  'lumbar_01', 'lumbar_02',
  'spine_01', 'upper_back_01', 'upper_back_02', 'upper_back_03', 'chest',
  'neck_01', 'neck_02', 'head',
  'ear_L', 'ear_R', 'jaw',
  'tail_01', 'tail_02', 'tail_03', 'tail_04',
  'shoulder_L', 'upper_arm_L', 'lower_arm_L', 'paw_front_L',
  'shoulder_R', 'upper_arm_R', 'lower_arm_R', 'paw_front_R',
  'thigh_L', 'shin_L', 'foot_L', 'paw_back_L',
  'thigh_R', 'shin_R', 'foot_R', 'paw_back_R'
];

const ANIM_REQUIREMENTS = {
  idle:    ['hips', 'chest', 'head'],
  sitDown: ['thigh_L', 'thigh_R', 'shin_L', 'shin_R', 'hips', 'chest'],
  layDown: ['thigh_L', 'thigh_R', 'shin_L', 'shin_R', 'shoulder_L', 'shoulder_R', 'upper_arm_L', 'upper_arm_R', 'hips', 'chest', 'root'],
  standUp: ['thigh_L', 'thigh_R', 'shin_L', 'shin_R', 'hips', 'chest'],
  walk:    ['shoulder_L', 'shoulder_R', 'thigh_L', 'thigh_R'],
  run:     ['shoulder_L', 'shoulder_R', 'thigh_L', 'thigh_R', 'spine_01']
};

function diagnoseRig(model, gltf) {
  const foundBones = [];
  const skinnedMeshes = [];
  let skinnedVertexCount = 0;
  let unskinnedMeshCount = 0;
  let unskinnedVertexCount = 0;

  model.traverse(n => {
    if (n.isBone) foundBones.push({ name: n.name, parent: n.parent?.name, pos: n.position.toArray().map(v => +v.toFixed(3)) });
    if (n.isSkinnedMesh) {
      skinnedMeshes.push({
        name: n.name,
        vertices: n.geometry.attributes.position?.count || 0,
        skeletonBones: n.skeleton?.bones?.length || 0
      });
      skinnedVertexCount += n.geometry.attributes.position?.count || 0;
    } else if (n.isMesh) {
      unskinnedMeshCount++;
      unskinnedVertexCount += n.geometry.attributes.position?.count || 0;
    }
  });

  const foundNames = new Set(foundBones.map(b => b.name));
  const missing = EXPECTED_BONES_CAT.filter(b => !foundNames.has(b));
  const extras  = foundBones.map(b => b.name).filter(b => !EXPECTED_BONES_CAT.includes(b));

  const bbox = new THREE.Box3().setFromObject(model);
  const size = bbox.getSize(new THREE.Vector3());
  const dims = [size.x, size.y, size.z].sort((a, b) => a - b);
  const longestHorizontal = dims[2];
  const height = size.y;
  const poseScore = longestHorizontal > 0 ? height / longestHorizontal : 0;
  let poseHeuristic;
  if (poseScore < 0.5) poseHeuristic = 'likely T-pose (horizontal)';
  else if (poseScore < 0.75) poseHeuristic = 'ambiguous (crouched?)';
  else poseHeuristic = 'likely sitting or standing-up (vertical)';

  const animCoverage = {};
  for (const [anim, req] of Object.entries(ANIM_REQUIREMENTS)) {
    const missingForAnim = req.filter(b => !foundNames.has(b));
    animCoverage[anim] = {
      required: req.length,
      present:  req.length - missingForAnim.length,
      missing:  missingForAnim,
      complete: missingForAnim.length === 0
    };
  }

  const bakedClips = (gltf?.animations || []).map(c => ({
    name: c.name, duration: +c.duration.toFixed(3), tracks: c.tracks.length
  }));

  return {
    expected: EXPECTED_BONES_CAT.length,
    found:    foundBones.length,
    coveredExpected: EXPECTED_BONES_CAT.length - missing.length,
    missing, extras, bones: foundBones,
    skinnedMeshes, skinnedVertexCount,
    unskinnedMeshCount, unskinnedVertexCount,
    bbox: { x: +size.x.toFixed(3), y: +size.y.toFixed(3), z: +size.z.toFixed(3) },
    poseScore: +poseScore.toFixed(2),
    poseHeuristic,
    bakedClips,
    animCoverage
  };
}

function logDiagnosis(assetId, source, report) {
  console.groupCollapsed(`[${assetId}] Rigging diagnosis (${source}) - ${report.coveredExpected}/${report.expected} expected bones`);
  console.log('Source URL:', source);
  console.log('Bone coverage:', `${report.coveredExpected}/${report.expected}`);
  console.log('Missing expected bones:', report.missing.length ? report.missing : '(none)');
  console.log('Unexpected extra bones:', report.extras.length ? report.extras : '(none)');
  console.log('Total bones found:', report.found);
  console.log('Skinned meshes:', report.skinnedMeshes);
  console.log('Unskinned meshes:', `${report.unskinnedMeshCount} mesh / ${report.unskinnedVertexCount} verts`);
  console.log('BBox (xyz):', report.bbox, '-> pose heuristic:', report.poseHeuristic, `(score ${report.poseScore})`);
  console.log('Baked animation clips:', report.bakedClips.length ? report.bakedClips : '(none, expected)');
