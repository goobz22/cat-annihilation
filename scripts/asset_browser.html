function getCurrentList() {
  if (state.category === 'cats')  return CATS;
  if (state.category === 'dogs')  return DOGS;
  if (state.category === 'props') return PROPS;
  if (state.category === 'rigs')  return CANONICAL_RIGS;
  return [];
}

function getAsset(id) { return getCurrentList().find(a => a.id === id) || null; }

function displayName(asset) {
  if (asset.kind === 'cat') return npcsIndex[asset.npcId]?.name || (asset.id === 'player' ? 'Player Cat' : asset.id);
  if (asset.kind === 'dog') return asset.name;
  if (asset.kind === 'rig') return asset.species === 'cat' ? 'Canonical Cat Rig' : 'Canonical Dog Rig';
  return asset.id.replace(/_/g, ' ');
}

function renderCategoryHeader() {
  const counts = { cats: CATS.length, dogs: DOGS.length, props: PROPS.length, rigs: CANONICAL_RIGS.length };
  const subs = {
    cats: '17 clan cats + player',
    dogs: '4 enemy dog variants',
    props: `${PROPS.length} environment + weapon + projectile assets`,
    rigs: 'Canonical anatomically-correct skeletons (no mesh)'
  };
  const labels = { cats: 'Cats', dogs: 'Dogs', props: 'Props', rigs: 'Rigs' };
  document.getElementById('categoryHeader').innerHTML =
    `${labels[state.category]} <span id="rosterCount" style="float:right;color:var(--muted);font-weight:400;">${counts[state.category]}</span>`;
  document.getElementById('categorySub').textContent = subs[state.category];
  document.querySelectorAll('#categoryTabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.category === state.category);
  });
}

function renderRoster() {
  const container = document.getElementById('roster');
  container.innerHTML = '';
  renderCategoryHeader();

  if (state.category === 'cats') {
    // Group cats by clan.
    const byClan = {};
    for (const cat of CATS) (byClan[cat.clan] ||= []).push(cat);
    const clanOrder = ['MistClan', 'StormClan', 'EmberClan', 'FrostClan', 'None'];
    for (const clan of clanOrder) {
      if (!byClan[clan]) continue;
      appendSection(container, clan === 'None' ? 'Neutral / Player' : clan, byClan[clan], clan);
    }
  } else if (state.category === 'dogs') {
    // Dogs are all "Enemy" - show them flat.
    appendSection(container, 'Enemies', DOGS, 'None');
  } else if (state.category === 'props') {
    // Props grouped by PROP_GROUPS order.
    for (const [groupName, ids] of Object.entries(PROP_GROUPS)) {
      const items = PROPS.filter(p => p.group === groupName);
      if (items.length) appendSection(container, groupName, items, 'None');
    }
  } else if (state.category === 'rigs') {
    appendSection(container, 'Canonical Skeletons', CANONICAL_RIGS, 'None');
  }
}

function appendSection(container, title, items, clanClass) {
  const section = document.createElement('div');
  section.className = 'roster-section';
  section.innerHTML = `<h3 class="${clanClass}"><span class="dot"></span>${title}</h3>`;
  for (const asset of items) {
    const row = document.createElement('div');
    row.className = `asset-row ${asset.clan || 'None'}${state.selectedId === asset.id ? ' active' : ''}`;
    row.innerHTML = `
      <div>
        <div class="name">${displayName(asset)}</div>
        <div class="role">${asset.role || ''}</div>
      </div>
    `;
    row.onclick = () => selectAsset(asset.id);
    section.appendChild(row);
  }
  container.appendChild(section);
}

function renderDetails() {
  const el = document.getElementById('details');
  const sub = document.getElementById('detailsSub');
  if (!state.selectedId) { el.innerHTML = ''; sub.textContent = 'Select an asset'; return; }
  const asset = getAsset(state.selectedId);
  if (!asset) { el.innerHTML = ''; sub.textContent = 'Asset not in current category'; return; }
  sub.textContent = `${displayName(asset)} - ${asset.role || asset.group || ''}`;

  const npc = asset.kind === 'cat' && asset.npcId ? npcsIndex[asset.npcId] : null;
  const hasPrompt = asset.kind === 'cat' || asset.kind === 'dog';
  const edited = state.promptEdits[asset.id] !== undefined
              && state.promptEdits[asset.id] !== (asset.kind === 'cat' ? CAT_PROMPTS[asset.id] : DOG_PROMPTS[asset.id]);

  let html = `<h3>Identity</h3>`;
  if (asset.kind === 'rig') {
    html += `<div class="kv"><span class="k">Source</span><span class="v">procedural (no GLB)</span></div>`;
    html += `<div class="kv"><span class="k">Species</span><span class="v">${asset.species}</span></div>`;
    html += `<div class="kv"><span class="k">Purpose</span><span class="v" style="color:var(--accent)">Validate animation without mesh. Bones match rig_quadruped.py names, so clips drive both.</span></div>`;
  } else {
    html += `<div class="kv"><span class="k">File</span><span class="v">${asset.id}.glb</span></div>`;
  }
  html += `<div class="kv"><span class="k">Role</span><span class="v">${asset.role || ''}</span></div>`;
  if (asset.clan && asset.clan !== 'None') {
    html += `<div class="kv"><span class="k">Clan</span><span class="v"><span class="chip ${asset.clan}">${asset.clan}</span></span></div>`;
  }
  if (asset.kind === 'dog') {
    html += `<div class="kv"><span class="k">Stats</span><span class="v">${asset.stats}</span></div>`;
    html += `<div class="kv"><span class="k">Status</span><span class="v" style="color:var(--warn)">Unrigged (lives in meshy_raw_dogs/)</span></div>`;
  }
  if (asset.kind === 'prop') {
    html += `<div class="kv"><span class="k">Group</span><span class="v">${asset.group}</span></div>`;
  }
  if (npc) {
    html += `<div class="kv"><span class="k">NPC ID</span><span class="v">${npc.id}</span></div>`;
    if (npc.position) html += `<div class="kv"><span class="k">Position</span><span class="v">[${npc.position.join(', ')}]</span></div>`;
    if (npc.dialogTreeId) html += `<div class="kv"><span class="k">Dialog</span><span class="v">${npc.dialogTreeId}.json</span></div>`;
  }

  if (hasPrompt) {
    html += `<h3>Meshy Prompt ${edited ? '<span class="edited-label">(edited)</span>' : ''}</h3>`;
    html += `<div class="prompt-editor">
      <textarea id="promptText" spellcheck="false">${escapeHtml(fullPromptFor(asset))}</textarea>
      <div class="row">
        <button class="primary" id="btnCopyPrompt">Copy prompt</button>
        <button id="btnSavePrompt">Save edit</button>
        <button id="btnRevertPrompt">Revert</button>
      </div>
    </div>`;
  }

  if (npc?.quests?.length) {
    html += `<h3>Quests</h3>`;
    for (const q of npc.quests) html += `<div class="quest-item"><span class="name">${q}</span></div>`;
  }
  if (npc?.trainingOptions?.length) {
    html += `<h3>Training Options</h3>`;
    for (const t of npc.trainingOptions) {
      html += `<div class="training-item">
        <span class="cost">${t.cost}g${t.requiredLevel ? ` - lvl ${t.requiredLevel}` : ''}</span>
        <div class="name">${t.name}</div>
        <div class="desc">${t.description}</div>
      </div>`;
    }
  }
  if (npc?.shopInventory?.length) {
    html += `<h3>Shop Inventory</h3>`;
    for (const s of npc.shopInventory) {
      html += `<div class="shop-item">
        <span class="price">${s.price}g${s.stock > 0 ? ` - x${s.stock}` : ''}</span>
        <div class="name">${s.name}</div>
        <div class="desc">${s.description}</div>
      </div>`;
    }
  }

  // Rig report for cats AND canonical rigs. Props/dogs-with-no-rig skip.
  // Two flavors:
  //   - RIGGED source: compare against our 26 expected Blender bones, show
  //     coverage %, pose heuristic, per-anim compatibility, remediation hints.
  //   - RAW source: Meshy doesn't auto-rig cats, so the expected-bone grid
  //     would be uniformly red and misleading. Render a different, simpler
  //     diagnostic explaining this is the pre-rig source + what to do next.
  if (currentReport && (asset.kind === 'cat' || asset.kind === 'rig')) {
    const r = currentReport;
    const isRaw = r.source === 'raw';

    html += `<h3>Rigging Report <span style="font-weight:400;color:${isRaw ? 'var(--warn)' : 'var(--muted)'};font-size:10px;text-transform:none;letter-spacing:0">(${isRaw ? 'RAW Meshy source' : 'rigged via Blender'})</span></h3>`;
    html += `<div class="rig-report">`;

    if (isRaw) {
      // Raw-source panel. Meshy's output should have zero bones unless the
      // user opted into Meshy's own auto-rigger during generation (which we
      // don't - their quadruped auto-rig is weak, which is why we rebuild
      // the rig ourselves). Anything other than 0 bones here means Meshy
      // shipped its auto-rig, which we'd want to flag.
      const expected = 0;
      const covClass = r.found === expected ? 'ok' : 'warn';
      html += `<div class="coverage ${covClass}">Raw mesh has ${r.found} bone${r.found === 1 ? '' : 's'} (expected ${expected} - Meshy doesn't auto-rig cats)</div>`;

      if (r.found > 0) {
        html += `<div class="coverage warn" style="margin-top:6px">Unexpected bones present (Meshy auto-rigger ran):</div>`;
        html += `<div class="extras">${r.bones.map(b => `\u00B7 ${b.name}`).join('  ')}</div>`;
      }

      html += `<div class="kv" style="margin-top:8px"><span class="k">BBox</span><span class="v">${r.bbox.x} \u00D7 ${r.bbox.y} \u00D7 ${r.bbox.z} m</span></div>`;
      html += `<div class="kv"><span class="k">Pose</span><span class="v">${r.poseHeuristic} (y/longest = ${r.poseScore})</span></div>`;
      html += `<div class="kv"><span class="k">Mesh</span><span class="v">${r.unskinnedMeshCount + r.skinnedMeshes.length} total (${r.unskinnedVertexCount + r.skinnedVertexCount} verts)</span></div>`;

      html += `<div class="note" style="border-color:var(--accent);background:#1e2a38;color:var(--text)"><strong>What you're seeing:</strong> this is the <em>raw Meshy download</em> before any rigging. Meshy's text-to-3D pipeline does not rig cats (the "Rigged T-pose" phrasing in our prompt is aspirational). To use this cat in-engine, switch the <strong>Source</strong> toggle at top-left to <strong>Rigged</strong> - that loads the heat-fallback Blender rig from <code>cats/rigged/</code>.</div>`;
      if (r.poseScore >= 0.75) {
        html += `<div class="note"><strong>Pose warning:</strong> this raw cat's bounding box is taller than it is long - Meshy exported it sitting or standing-up instead of in T-pose. <code>rig_quadruped.py</code> places bones using AABB ratios, so on a vertical pose the "shoulders" and "hips" will land in anatomically wrong locations even after rigging. Best fix: regenerate this cat in Meshy with a stronger <em>"standing naturally on all four paws, body parallel to the ground"</em> constraint.</div>`;
      }
    } else {
      // Rigged-source panel: full expected-bone audit.
      const covPct = r.coveredExpected / r.expected;
      const covClass = covPct >= 0.95 ? 'ok' : covPct >= 0.75 ? 'warn' : 'bad';
      html += `<div class="coverage ${covClass}">Bone coverage: ${r.coveredExpected} / ${r.expected} expected${r.extras.length ? ` (+${r.extras.length} extras)` : ''}</div>`;
      html += `<div class="bone-grid">`;
      for (const b of EXPECTED_BONES_CAT) {
        const hit = !r.missing.includes(b);
        html += `<span class="bone ${hit ? 'ok' : 'missing'}">${hit ? '\u2713' : '\u2717'} ${b}</span>`;
      }
      html += `</div>`;
      if (r.extras.length) {
        html += `<div class="coverage warn" style="margin-top:6px">Unexpected extra bones (often Meshy's auto-rig surviving the strip):</div>`;
        html += `<div class="extras">${r.extras.map(b => `\u00B7 ${b}`).join('  ')}</div>`;
      }
      html += `<div class="kv" style="margin-top:8px"><span class="k">BBox</span><span class="v">${r.bbox.x} \u00D7 ${r.bbox.y} \u00D7 ${r.bbox.z} m</span></div>`;
      html += `<div class="kv"><span class="k">Pose</span><span class="v">${r.poseHeuristic} (y/longest = ${r.poseScore})</span></div>`;
      html += `<div class="kv"><span class="k">Skinned</span><span class="v">${r.skinnedMeshes.length} mesh (${r.skinnedVertexCount} verts)</span></div>`;
      if (r.unskinnedMeshCount > 0) {
        html += `<div class="kv"><span class="k">Unskinned</span><span class="v" style="color:var(--warn)">${r.unskinnedMeshCount} mesh (${r.unskinnedVertexCount} verts) \u2014 will NOT deform</span></div>`;
      }
      if (r.bakedClips.length) {
        html += `<div class="kv"><span class="k">Baked clips</span><span class="v">${r.bakedClips.map(c => c.name).join(', ')}</span></div>`;
      }
      html += `<div style="margin-top:8px; font-weight:600; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:0.5px">Animation compatibility</div>`;
      html += `<div class="bone-grid">`;
      for (const [anim, cov] of Object.entries(r.animCoverage)) {
        const cls = cov.complete ? 'ok' : 'missing';
        html += `<span class="bone ${cls}">${cov.complete ? '\u2713' : '\u2717'} ${anim} ${cov.present}/${cov.required}</span>`;
      }
      html += `</div>`;
      if (r.poseScore >= 0.75) {
        html += `<div class="note"><strong>Heads up:</strong> this cat's bounding box is taller than it is long, suggesting Meshy exported a sitting or standing-up pose. scripts/rig_quadruped.py places bones from AABB ratios, so on a vertical pose the "shoulders" and "hips" land in anatomically wrong locations. Regenerate with a stronger <em>"standing naturally on all four paws, body parallel to the ground"</em> constraint, or hand-rig in Blender.</div>`;
      }
      if (r.missing.length > 0 && r.poseScore < 0.75) {
        html += `<div class="note"><strong>Heads up:</strong> ${r.missing.length} expected bones missing despite a reasonable pose. Likely cause: Blender's heat-diffusion weight solver failed (check rig_batch.log for "Bone Heat Weighting: failed to find solution") and bones got pruned during export.</div>`;
      }
    }

    html += `<div class="actions">`;
    html += `<button id="btnCopyReport">Copy report (markdown)</button>`;
    html += `<button id="btnLogReport">Log to console</button>`;
    html += `</div>`;
    html += `</div>`;

    // Bone Sandbox: only meaningful when the rigged cat has bones to rotate.
    // Lets you pick any bone and spin it on X/Y/Z individually - answers
    // "does thigh_L actually move the back-left leg, or does it warp the
    // belly?" without writing a test harness.
    if (!isRaw && r.found > 0) {
      const selectedName = sandboxSelectedBoneName || (r.bones[0] && r.bones[0].name);
      const stored = sandboxRotations.get(selectedName) || new THREE.Euler();
      const toDeg = (rad) => Math.round(rad * 180 / Math.PI);
      html += `<h3>Bone Sandbox</h3>`;
      html += `<div class="bone-sandbox">`;
      html += `<div class="row">
        <select id="sandboxBoneSelect">`;
      for (const b of r.bones) {
        const isSel = b.name === selectedName;
        html += `<option value="${b.name}"${isSel ? ' selected' : ''}>${b.name}${b.parent ? ' (parent: ' + b.parent + ')' : ''}</option>`;
      }
      html += `</select>
        <button id="sandboxResetBone" title="Reset just this bone">Reset</button>
        <button id="sandboxResetAll" title="Reset every bone to rest pose">Reset all</button>
      </div>`;
      for (const axis of ['x', 'y', 'z']) {
        const deg = toDeg(stored[axis] || 0);
        html += `<div class="slider-row">
          <span class="axis">${axis.toUpperCase()}</span>
          <input type="range" min="-180" max="180" step="1" value="${deg}" data-sandbox-axis="${axis}">
          <span class="val" data-sandbox-val="${axis}">${deg}\u00B0</span>
        </div>`;
      }
      html += `<div class="preset">
        <button data-sandbox-preset="x45"    title="Rotate X +45 deg">X +45</button>
        <button data-sandbox-preset="x-45"   title="Rotate X -45 deg">X -45</button>
        <button data-sandbox-preset="y45"    title="Rotate Y +45 deg">Y +45</button>
        <button data-sandbox-preset="y-45"   title="Rotate Y -45 deg">Y -45</button>
        <button data-sandbox-preset="z45"    title="Rotate Z +45 deg">Z +45</button>
        <button data-sandbox-preset="z-45"   title="Rotate Z -45 deg">Z -45</button>
      </div>`;
      html += `<div class="hint">Drag a slider to rotate <strong>only</strong> the selected bone. Moving a slider pauses playback so the rotation holds. Click any Animate button to resume. Toggle <strong>Weights</strong> in the Display toolbar to see which vertices each bone controls.</div>`;
      html += `</div>`;
    }
  }

  el.innerHTML = html;

  // Wire per-load buttons.
  const btnCopyPrompt = document.getElementById('btnCopyPrompt');
  if (btnCopyPrompt) {
    btnCopyPrompt.onclick = () => {
      const ta = document.getElementById('promptText');
      navigator.clipboard.writeText(ta.value).then(() => toast(`Copied prompt for ${asset.id}`));
    };
    document.getElementById('btnSavePrompt').onclick = () => {
      const ta = document.getElementById('promptText');
      let v = ta.value;
      const pfx = asset.kind === 'cat' ? PROMPT_PREFIX_CAT : PROMPT_PREFIX_DOG;
      const sfx = asset.kind === 'cat' ? PROMPT_SUFFIX_CAT : PROMPT_SUFFIX_DOG;
      if (pfx && v.startsWith(pfx) && v.endsWith(sfx)) v = v.slice(pfx.length, v.length - sfx.length);
      else if (!pfx && v.endsWith(sfx)) v = v.slice(0, v.length - sfx.length);
      state.promptEdits[asset.id] = v;
      saveState();
      toast(`Saved prompt edit for ${asset.id}`);
      renderDetails();
    };
    document.getElementById('btnRevertPrompt').onclick = () => {
      delete state.promptEdits[asset.id];
      saveState();
      toast(`Reverted ${asset.id} to default prompt`);
      renderDetails();
    };
  }
  const btnCopyReport = document.getElementById('btnCopyReport');
  if (btnCopyReport) {
    btnCopyReport.onclick = () => {
      const url = pathFor(asset, state.toggles.rigged && assetSupportsRigged(asset));
      navigator.clipboard.writeText(formatReportMarkdown(asset.id, url, currentReport)).then(() => toast('Rig report copied as markdown'));
    };
    document.getElementById('btnLogReport').onclick = () => {
      logDiagnosis(asset.id, pathFor(asset, true), currentReport);
      toast('Dumped to console - open devtools');
    };
  }

  // Bone Sandbox wiring. The panel only exists when viewing a rigged cat
  // with bones, so guard every lookup.
  const sandboxSelect = document.getElementById('sandboxBoneSelect');
  if (sandboxSelect) {
    sandboxSelect.onchange = () => {
      sandboxSelectedBoneName = sandboxSelect.value;
      renderDetails(); // re-render so sliders reflect the newly-selected bone's stored rotation
    };
    // Sliders: dragging updates the bone in real time and writes back to the
    // numeric label. No mixer interaction - setBoneRotation stops activeAction.
    document.querySelectorAll('[data-sandbox-axis]').forEach(slider => {
      const axis = slider.dataset.sandboxAxis;
      slider.oninput = () => {
        const deg = parseFloat(slider.value);
        const rad = deg * Math.PI / 180;
        setBoneRotation(sandboxSelect.value, axis, rad);
        const label = document.querySelector(`[data-sandbox-val="${axis}"]`);
        if (label) label.textContent = `${Math.round(deg)}\u00B0`;
      };
    });
    document.getElementById('sandboxResetBone').onclick = () => {
      setBoneRotation(sandboxSelect.value, 'x', 0);
      setBoneRotation(sandboxSelect.value, 'y', 0);
      setBoneRotation(sandboxSelect.value, 'z', 0);
      sandboxRotations.delete(sandboxSelect.value);
      renderDetails();
    };
    document.getElementById('sandboxResetAll').onclick = () => {
      resetAllBoneRotations();
      toast('All bones reset to rest pose');
      renderDetails();
    };
    // Preset rotation buttons - quick ±45deg nudges without dragging sliders.
    document.querySelectorAll('[data-sandbox-preset]').forEach(btn => {
      btn.onclick = () => {
        const spec = btn.dataset.sandboxPreset; // e.g. "x45", "y-45"
        const axis = spec[0];
        const deg = parseInt(spec.slice(1), 10);
        setBoneRotation(sandboxSelect.value, axis, deg * Math.PI / 180);
        renderDetails();
      };
    });
  }
}

function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function selectAsset(id) {
  state.selectedId = id;
  saveState();
  currentReport = null;
  // Sandbox state is per-model - clear when switching so slider positions
  // don't carry over to a different skeleton.
  sandboxSelectedBoneName = null;
  sandboxRotations.clear();
  renderRoster();
  const asset = getAsset(id);
  if (!asset) { renderDetails(); return; }
  renderDetails();
  // Source toggle only meaningful for cats. Disable it for dogs/props.
  const srcGroup = document.getElementById('sourceGroup');
  const supports = assetSupportsRigged(asset);
  srcGroup.querySelectorAll('button').forEach(b => b.classList.toggle('disabled', !supports));
  loadAsset(asset);
}

// ===========================================================================
// TOOLBAR WIRING
// ===========================================================================

// Category tabs
document.querySelectorAll('#categoryTabs button').forEach(btn => {
  btn.onclick = () => {
    if (state.category === btn.dataset.category) return;
    state.category = btn.dataset.category;
    state.selectedId = null; // reset selection when switching categories
    saveState();
    renderRoster();
    renderDetails();
    // Unload current model so the empty state reappears.
    clearModel();
    document.getElementById('viewerEmpty').style.display = '';
    document.getElementById('statusFile').textContent = '-';
    document.getElementById('statusMeta').textContent = 'drag to rotate - scroll to zoom - shift-drag to pan';
    updateAnimButtonStates();
  };
});

// Source (Rigged / Raw) - behaves as a radio pair
const btnRigged = document.getElementById('btnRigged');
const btnRaw = document.getElementById('btnRaw');
function updateSourceButtons() {
  btnRigged.classList.toggle('active', state.toggles.rigged);
  btnRaw.classList.toggle('active', !state.toggles.rigged);
}
updateSourceButtons();
btnRigged.onclick = () => {
  if (state.toggles.rigged) return;
  state.toggles.rigged = true;
  saveState();
  updateSourceButtons();
  if (state.selectedId) loadAsset(getAsset(state.selectedId));
};
btnRaw.onclick = () => {
  if (!state.toggles.rigged) return;
  state.toggles.rigged = false;
  saveState();
  updateSourceButtons();
  if (state.selectedId) loadAsset(getAsset(state.selectedId));
};

// Generic toggle wiring - updates classes and runs the provided side-effect.
function setupToggle(buttonId, toggleKey, onChange) {
  const btn = document.getElementById(buttonId);
  const update = () => btn.classList.toggle('active', !!state.toggles[toggleKey]);
  update();
  btn.onclick = () => {
    state.toggles[toggleKey] = !state.toggles[toggleKey];
    saveState();
    update();
    if (onChange) onChange(state.toggles[toggleKey]);
  };
}
setupToggle('btnSkeleton', 'skeleton', (on) => { if (currentSkeletonHelper) currentSkeletonHelper.visible = on; });
setupToggle('btnWireframe', 'wireframe', (on) => { if (currentModel) applyWireframe(currentModel, on); });
setupToggle('btnWeights', 'weights', (on) => { if (currentModel) applyWeightViz(currentModel, on); });
setupToggle('btnAxes', 'axes', (on) => { axesHelper.visible = on; });
setupToggle('btnAutoRotate', 'autoRotate');

document.getElementById('btnReset').onclick = () => {
  camera.position.copy(DEFAULT_CAMERA.pos);
  controls.target.copy(DEFAULT_CAMERA.target);
  controls.update();
};

// Background swatches - each carries a hex value in data-bg.
document.querySelectorAll('.bg-swatch').forEach(btn => {
  btn.onclick = () => setBackground(parseInt(btn.dataset.bg, 16));
});

// Animation buttons. Scope to [data-anim] so the Pause button in the
// same group doesn't get caught here - previously clicking Pause called
// playAnim(undefined) which reported "undefined clip: no matching bones"
// and overwrote the Pause button's own click handler.
document.querySelectorAll('#animGroup button[data-anim]').forEach(btn => {
  btn.onclick = () => playAnim(btn.dataset.anim);
});

// ===========================================================================
// TOAST
// ===========================================================================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ===========================================================================
// BOOT
// ===========================================================================
(async () => {
  await loadNPCs();
  renderRoster();
  renderDetails();
  if (state.selectedId) {
    const a = getAsset(state.selectedId);
    if (a) {
      const srcGroup = document.getElementById('sourceGroup');
      srcGroup.querySelectorAll('button').forEach(b => b.classList.toggle('disabled', !assetSupportsRigged(a)));
      loadAsset(a);
    }
  }
})();
</script>

</body>
</html>
