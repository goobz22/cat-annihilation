function formatReportMarkdown(assetId, source, report) {
  const lines = [];
  const isRaw = report.source === 'raw';
  lines.push(`# Rigging diagnosis: ${assetId}${isRaw ? ' (RAW source)' : ''}`);
  lines.push('');
  lines.push(`- **Source:** \`${source}\` (${isRaw ? 'pre-rig Meshy download - expected to have 0 bones' : 'Blender-rigged via rig_quadruped.py'})`);
  if (!isRaw) lines.push(`- **Bone coverage:** ${report.coveredExpected} / ${report.expected} expected bones`);
  lines.push(`- **Total bones in GLB:** ${report.found}`);
  lines.push(`- **Skinned meshes:** ${report.skinnedMeshes.length} (${report.skinnedVertexCount} skinned verts)`);
  lines.push(`- **Unskinned meshes:** ${report.unskinnedMeshCount} (${report.unskinnedVertexCount} unskinned verts)`);
  lines.push(`- **Bounding box (xyz):** ${report.bbox.x} x ${report.bbox.y} x ${report.bbox.z} m`);
  lines.push(`- **Pose heuristic:** ${report.poseHeuristic} (score ${report.poseScore})`);
  lines.push(`- **Baked anim clips:** ${report.bakedClips.length ? report.bakedClips.map(c => c.name).join(', ') : 'none'}`);

  if (isRaw) {
    // Raw sources intentionally have no Blender bones - a missing-bones
    // table would be a wall of red that misrepresents the actual state.
    // Instead explain what the user is looking at and what to do next.
    lines.push('');
    lines.push('## What you\'re seeing');
    lines.push('');
    lines.push('This is the **raw Meshy download** before any rigging. Meshy\'s text-to-3D pipeline does not auto-rig cats (the "Rigged T-pose" phrasing in our prompt is aspirational). To use this cat in-engine, switch the **Source** toggle in the browser to **Rigged** - that loads the Blender-rigged copy from `cats/rigged/`.');
    if (report.poseScore >= 0.75) {
      lines.push('');
      lines.push('## Pose warning');
      lines.push('');
      lines.push(`This raw cat's bounding box is taller than it is long (y/longest = ${report.poseScore}) - Meshy exported it sitting or standing-up instead of in T-pose. \`rig_quadruped.py\` places bones using AABB ratios, so on a vertical pose the "shoulders" and "hips" will land in anatomically wrong locations even after rigging. Best fix: regenerate this cat in Meshy with a stronger *"standing naturally on all four paws, body parallel to the ground"* constraint.`);
    }
    if (report.found > 0) {
      // If Meshy's auto-rigger DID ship bones (which we don't expect but
      // might happen if the user enables it in Meshy settings), list them
      // so the user can compare against their own rigging plans.
      lines.push('');
      lines.push('## Bones unexpectedly present in raw');
      for (const b of report.bones) lines.push(`- \`${b.name}\` (parent: ${b.parent || '-'})`);
    }
    return lines.join('\n');
  }

  // Rigged source: full bone-audit + animation-coverage breakdown.
  if (report.missing.length) {
    lines.push('', '## Missing expected bones');
    for (const b of report.missing) lines.push(`- ${b}`);
  }
  if (report.extras.length) {
    lines.push('', '## Unexpected extra bones');
    for (const b of report.extras) lines.push(`- ${b}`);
  }
  lines.push('', '## Per-animation coverage');
  for (const [anim, cov] of Object.entries(report.animCoverage)) {
    lines.push(`- **${anim}:** ${cov.present}/${cov.required}${cov.missing.length ? ' (missing: ' + cov.missing.join(', ') + ')' : ''}`);
  }
  return lines.join('\n');
}

// ===========================================================================
// WEIGHT VISUALIZATION
// ===========================================================================
//
// Envelope weights leak between body parts - moving a "thigh" bone can warp
// the belly if the envelope radius is larger than the anatomical distance.
// The Weights display toggle colors each vertex by its DOMINANT bone so
// you can see at a glance which chunk of mesh each bone owns. If the
// left-back-leg is half blue and half red, weights are broken there.
//
// Implementation:
//   1. Walk skinned meshes, read each vertex's (boneIndex, weight) stream
//   2. For each vertex, find the bone with the highest weight
//   3. Assign a distinct hue per bone index, write to a new Color attribute
//   4. Swap the material's vertex-color flag on/off

// Deterministic hue-per-bone-index: hash the index through the golden ratio
// so adjacent bones get visually distinct colors (adjacent indices would
// otherwise map to adjacent hues = hard to tell leg segments apart).
const GOLDEN_RATIO_CONJUGATE = 0.61803398875;
function boneColor(index, out) {
  const hue = ((index * GOLDEN_RATIO_CONJUGATE) % 1);
  out = out || new THREE.Color();
  out.setHSL(hue, 0.65, 0.55);
  return out;
}

// Cache the mesh's original materials + per-material { vertexColors, color }
// before we mutate them, so the toggle-off restore is exact.
const weightVizState = new WeakMap(); // mesh -> { mats: [ { mat, vertexColors, color } ] }

function applyWeightViz(root, on) {
  root.traverse(node => {
    if (!node.isSkinnedMesh) return;
    const geom = node.geometry;
    const skinIndex = geom.attributes.skinIndex;
    const skinWeight = geom.attributes.skinWeight;
    if (!skinIndex || !skinWeight) return;

    const mats = Array.isArray(node.material) ? node.material : [node.material];

    if (on) {
      // Build a vertex color buffer from the dominant bone per vertex. glTF
      // stores up to 4 (index, weight) pairs per vertex; we scan all 4 and
      // pick the max-weight one. Zero-weight verts stay black so broken
      // regions are visually obvious.
      const vertCount = skinIndex.count;
      const colors = new Float32Array(vertCount * 3);
      const tmp = new THREE.Color();
      for (let i = 0; i < vertCount; i++) {
        let bestBone = 0;
        let bestWeight = 0;
        for (let c = 0; c < 4; c++) {
          const w = skinWeight.array[i * 4 + c];
          if (w > bestWeight) { bestWeight = w; bestBone = skinIndex.array[i * 4 + c]; }
        }
        if (bestWeight > 0) {
          boneColor(bestBone, tmp);
          colors[i * 3 + 0] = tmp.r;
          colors[i * 3 + 1] = tmp.g;
          colors[i * 3 + 2] = tmp.b;
        } // else leave black
      }
      geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      // Cache + replace material properties so they can be restored.
      if (!weightVizState.has(node)) {
        weightVizState.set(node, mats.map(m => ({ mat: m, vertexColors: m.vertexColors, color: m.color.clone(), map: m.map })));
      }
      for (const m of mats) {
        m.vertexColors = true;
        m.color.setRGB(1, 1, 1);
        m.map = null; // suppress texture so the weight color reads clearly
        m.needsUpdate = true;
      }
    } else {
      // Restore original material properties.
      const cache = weightVizState.get(node);
      if (cache) {
        for (const entry of cache) {
          entry.mat.vertexColors = entry.vertexColors;
          entry.mat.color.copy(entry.color);
          entry.mat.map = entry.map;
          entry.mat.needsUpdate = true;
        }
        weightVizState.delete(node);
      }
      geom.deleteAttribute('color');
    }
  });
}

// ===========================================================================
// BONE SANDBOX
// ===========================================================================
//
// A diagnostic tool for testing what each bone actually moves. Select any
// bone from a dropdown, get three rotation sliders (X/Y/Z, -180..180 deg).
// Dragging a slider rotates ONLY that bone so you can see exactly which
// mesh region it controls. Hitting "Reset all" or switching cats zeroes
// every bone.
//
// Integration with the animation mixer: when the user touches a slider,
// we stop the currently-playing action so mixer.update() doesn't clobber
// the manual rotation on the next frame. Clicking an anim button resumes
// normal playback.

let sandboxSelectedBoneName = null;
const sandboxRotations = new Map(); // boneName -> THREE.Euler, for UI state restoration across re-renders

function allBonesIn(model) {
  const out = [];
  if (!model) return out;
  model.traverse(n => { if (n.isBone) out.push(n); });
  return out;
}

function resetAllBoneRotations() {
  if (!currentModel) return;
  allBonesIn(currentModel).forEach(b => b.rotation.set(0, 0, 0));
  sandboxRotations.clear();
}

function setBoneRotation(boneName, axis, radians) {
  if (!currentModel) return;
  const bone = findBone(currentModel, boneName);
  if (!bone) return;
  bone.rotation[axis] = radians;
  let stored = sandboxRotations.get(boneName);
  if (!stored) { stored = new THREE.Euler(); sandboxRotations.set(boneName, stored); }
  stored[axis] = radians;
  // Stop any running animation so mixer.update() doesn't reset the bone
  // on the next frame. User resumes by clicking an Anim button.
  if (activeAction) { activeAction.stop(); activeAction = null; }
  document.querySelectorAll('#animGroup button').forEach(b => b.classList.remove('active'));
}

// ===========================================================================
// ANIMATION SYSTEM (cats only)
// ===========================================================================
// Procedural clips built from the Blender rig's bone names. See the v3
// comments for the design rationale - unchanged here.

let mixer = null;
let activeAction = null;
let clipCache = null;
const animClock = new THREE.Clock();
let currentAnim = 'idle';

const X_AXIS = new THREE.Vector3(1, 0, 0);
const Y_AXIS = new THREE.Vector3(0, 1, 0);
const Z_AXIS = new THREE.Vector3(0, 0, 1);
function quatAxisAngle(axis, angleRad) {
  return new THREE.Quaternion().setFromAxisAngle(axis, angleRad).toArray();
}

// ----------------------------------------------------------------------
// Rig-aware side axis.
//
// The leg-swing hinge for walk/run and the thigh-pitch hinge for
// sit/lay/stand is the cat's SIDE axis (horizontal, perpendicular to
// body forward). Previously this was hardcoded as world +Z, which only
// works when the rig's forward happens to be +X.
//
// Meshy + rig_quadruped.py export skeletons where body-forward can be
// any horizontal direction. For example `mist_merchant` has
// chest-hips = (0, 0, -0.814) — forward is -Z — so rotating around
// world +Z spins the leg around the forward axis and the paw pendulums
// side to side. That showed up in test_per_cat_anim.ts as 15/17 cats
// failing with "paw moves SIDEWAYS".
//
// Fix: at clip-build time, find hips + chest in the rig, compute
// forward = (chest - hips) projected to the horizontal plane, and
// derive side = cross(forward, up_Y). For the canonical cat rig
// (forward=+X) this returns +Z, so no regression. For Meshy cats
// (forward=-Z) it returns +X, so the hinge is now the actual side
// axis regardless of how the exporter aligned the skeleton.
function computeRigSideAxis(model) {
  let hipsBone = null, chestBone = null;
  model.traverse(n => {
    if (!n.isBone) return;
    if (n.name === 'hips') hipsBone = n;
    else if (n.name === 'chest') chestBone = n;
  });
  if (!hipsBone || !chestBone) return Z_AXIS.clone();
  model.updateMatrixWorld(true);
  const hipsWorld = new THREE.Vector3(); hipsBone.getWorldPosition(hipsWorld);
  const chestWorld = new THREE.Vector3(); chestBone.getWorldPosition(chestWorld);
  const forward = chestWorld.sub(hipsWorld);
  forward.y = 0;
  if (forward.lengthSq() < 1e-8) return Z_AXIS.clone();
  forward.normalize();
  const side = new THREE.Vector3().crossVectors(forward, Y_AXIS).normalize();
  return side;
}
function findBone(root, name) {
  let match = null;
  root.traverse(n => { if (n.isBone && n.name === name) match = n; });
  return match;
}
function buildRotTrack(model, boneName, samples) {
  const bone = findBone(model, boneName);
  if (!bone) return null;
  // The `axis` in samples is a WORLD-SPACE axis that we want the
  // delta rotation to happen around. To apply it as bone.quaternion
  // (which is in PARENT-LOCAL space), we transform the axis into the
  // bone's parent world frame: localAxis = inverse(parentWorldQuat) *
  // worldAxis. Then pre-multiply with bind:
  //   keyframe = delta_in_parent * bind
  //
  // Why this works on any bind:
  //   Canonical rig: every bone's parent has identity world quat, so
  //   localAxis == worldAxis, and delta * identity_bind == delta. Same
  //   as the original naive code.
  //   GLB rigs: each bone's parent chain has some accumulated world
  //   rotation (from Blender's bone orientations). Transforming the
  //   desired world-axis into that parent frame means "legs swing
  //   around world Z" produces identical anatomical motion no matter
  //   how Blender exported the bones. Without this transform, the
  //   previous post-multiply (bind * delta_local) rotated around the
  //   bone's OWN local axes - which on GLB cats point in random
  //   anatomical directions based on bone roll, causing legs to
  //   swing sideways instead of forward-back. Tests in test_per_cat_anim.ts
  //   caught this as "lateral/forward ratio > 1" on 15 cats.
  model.updateMatrixWorld(true);
  const parentWorldQuat = new THREE.Quaternion();
  if (bone.parent) {
    bone.parent.getWorldQuaternion(parentWorldQuat);
  }
  const parentWorldQuatInv = parentWorldQuat.clone().invert();
  const bindQuat = bone.quaternion.clone();
  const localAxis = new THREE.Vector3();
  const delta = new THREE.Quaternion();
  const composed = new THREE.Quaternion();
  const times = [];
  const values = [];
  for (const [t, axis, angle] of samples) {
    times.push(t);
    // Transform world-space axis into parent's frame.
    localAxis.copy(axis).applyQuaternion(parentWorldQuatInv);
    delta.setFromAxisAngle(localAxis, angle);
    // Pre-multiply: composed = delta * bind.
    composed.copy(delta).multiply(bindQuat);
    values.push(composed.x, composed.y, composed.z, composed.w);
  }
  return new THREE.QuaternionKeyframeTrack(`${bone.name}.quaternion`, times, values);
}

function buildIdleClip(model) {
  // Idle = hold BIND POSE exactly. Previously I keyframed bones at
  // identity quaternion (rotation 0 around X), which is only correct
  // when the bind rotation IS identity (as on the procedural canonical
  // rig). Blender-rigged GLBs have NON-identity bind rotations (the
  // glTF exporter bakes bone orientations into each bone's local
  // quaternion), so setting to identity ROTATES the bone AWAY from
  // bind and deforms the mesh. User reported this as "the cat looks
  // totally messed up at rest."
  //
  // Fix: read each bone's CURRENT (bind) quaternion at clip-build time
  // and use that as the keyframe value at both t=0 and t=dur. The mixer
  // sets bone.quaternion = bind every frame - effectively a no-op -
  // so the mesh stays at its bind shape (= source Meshy mesh).
  const tracks = [];
  for (const b of ['hips', 'chest', 'head', 'tail_01']) {
    const bone = findBone(model, b);
    if (!bone) continue;
    const q = bone.quaternion.toArray();
    const times = [0, 2];
    const values = [...q, ...q];
    tracks.push(new THREE.QuaternionKeyframeTrack(`${bone.name}.quaternion`, times, values));
  }
  return tracks.length ? new THREE.AnimationClip('idle', 2.0, tracks) : null;
}
// Axis convention for the canonical rig:
//   +X = forward (head direction)
//   +Y = up
//   +Z = right side
//
// A leg bone hangs from its shoulder/thigh pointing down (local -Y). To
// swing it FORWARD/BACK (the visible motion of a walking gait), we rotate
// around the Z axis - the lateral side-to-side axis. Rotating around X
// would pivot the leg SIDEWAYS (left/right), which is wrong for walking.
// (The previous version rotated around X, so every leg looked like it
// was pedaling a bike sideways.) Tail yaw is still around Y for the
// side-to-side swish.
//
// Walk pattern: lateral gait (same-side legs move together). FL+BL swing
// forward while FR+BR swing back, then swap. This matches "left leg
// moves front, right leg back, then right leg front, left leg back" as
// described. A real cat's preferred gait is diagonal (FL+BR together)
// but lateral reads more clearly at this fidelity.

function buildWalkClip(model) {
  const dur = 1.0;
  const amp = THREE.MathUtils.degToRad(22);
  const kneeAmp = THREE.MathUtils.degToRad(15);
  const tracks = [];
  const sideAxis = computeRigSideAxis(model);

  // Lateral gait: left side in phase 0, right side in phase 0.5. Rotating
  // a down-pointing bone around the rig's side axis swings it forward-back.
  const legPhases = [
    ['shoulder_L', 0.00],
    ['thigh_L',    0.00],
    ['shoulder_R', 0.50],
    ['thigh_R',    0.50]
  ];
  for (const [bone, phase] of legPhases) {
    const samples = [];
    for (let i = 0; i <= 4; i++) {
      const t = (i / 4) * dur;
      samples.push([t, sideAxis, Math.sin(2 * Math.PI * (i / 4 + phase)) * amp]);
    }
    const track = buildRotTrack(model, bone, samples);
    if (track) tracks.push(track);
  }
  // Knee/elbow bend on the swing upswing so the paw lifts off the ground.
  const kneePhases = [
    ['lower_arm_L', 0.00],
    ['shin_L',      0.00],
    ['lower_arm_R', 0.50],
    ['shin_R',      0.50]
  ];
  for (const [bone, phase] of kneePhases) {
    const samples = [];
    for (let i = 0; i <= 8; i++) {
      const t = (i / 8) * dur;
      const s = Math.sin(2 * Math.PI * (i / 8 + phase));
      samples.push([t, sideAxis, -Math.max(0, s) * kneeAmp]);
    }
    const track = buildRotTrack(model, bone, samples);
    if (track) tracks.push(track);
  }
  // Tail swishes side-to-side in counter-rhythm. Y-axis rotation = yaw.
  const tailSamples = [];
  for (let i = 0; i <= 4; i++) {
    const t = (i / 4) * dur;
    tailSamples.push([t, Y_AXIS, Math.sin(2 * Math.PI * i / 4) * THREE.MathUtils.degToRad(10)]);
  }
  const tailTrack = buildRotTrack(model, 'tail_01', tailSamples);
  if (tailTrack) tracks.push(tailTrack);

  // Head + neck bob. Real cats carry their head in subtle rhythm with
  // the gait - a gentle up-down pitch on each stride and a slight yaw
  // tracking the shoulders. Without this the face mesh stays dead-still
  // while the body moves, which reads "broken" visually (user reported
  // "mouth and eye part just staying there").
  //
  // We split the motion to avoid two tracks targeting the same bone's
  // quaternion (three.js mixer doesn't blend multiple QuaternionKeyframeTracks
  // on the same bone; last-written wins):
  //   neck_01 + neck_02 -> pitch (up/down bob) around sideAxis
  //   head              -> yaw  (left/right turn) around world Y
  // The two rotations compose cleanly through the skeleton hierarchy so
  // the face ends up with both motions.
  const headPitchAmp = THREE.MathUtils.degToRad(4);
  const headYawAmp   = THREE.MathUtils.degToRad(6);
  for (const [bone, weight] of [['neck_01', 0.6], ['neck_02', 1.0]]) {
    const pitchSamples = [];
    for (let i = 0; i <= 8; i++) {
      const t = (i / 8) * dur;
      pitchSamples.push([t, sideAxis, Math.sin(2 * Math.PI * i / 8) * headPitchAmp * weight]);
    }
    const pitchTrack = buildRotTrack(model, bone, pitchSamples);
    if (pitchTrack) tracks.push(pitchTrack);
  }
  // Head yaw - counter-phase to tail so head turns away from the swinging
  // rear. Matches real cat gait visual: head tracks forward, body sways,
  // tail counter-sways.
  const headYawSamples = [];
  for (let i = 0; i <= 4; i++) {
    const t = (i / 4) * dur;
    headYawSamples.push([t, Y_AXIS, -Math.sin(2 * Math.PI * i / 4) * headYawAmp]);
  }
  const headYawTrack = buildRotTrack(model, 'head', headYawSamples);
  if (headYawTrack) tracks.push(headYawTrack);

  return tracks.length ? new THREE.AnimationClip('walk', dur, tracks) : null;
}

function buildRunClip(model) {
  // Gallop - visually readable for an IN-PLACE preview where the cat
  // doesn't translate forward. Earlier versions used "rotary" phasing
  // (backs 180 degrees out of phase from fronts) which is anatomically
  // correct for a real cat, but reads badly without forward motion:
  // when the front legs are in their stance phase (planted, pushing
  // body forward) without body translation they literally just look
  // like they're kicking backward through the air. User saw "galloping
  // backwards with its front legs" which is exactly this artifact.
  //
  // Instead we do a simplified "bound" style where BOTH fronts swing
  // forward at the same time, BOTH backs swing forward at the same
  // time, with backs and fronts IN PHASE for the forward reach
  // (extension). The cat reads clearly as "all four legs reaching
  // forward then all four pulled back to push off", which is what the
  // eye expects for a gallop silhouette.
  //
  // The spine carries most of the "gallop energy": deep arch when legs
  // are tucked (gather), flat stretch when legs are extended. Head bobs
  // with the spine for readability.
  //
  // Duration 0.55s = ~2 strides/sec, a housecat sprint.
  const dur = 0.55;
  const backLegAmp   = THREE.MathUtils.degToRad(50);
  const frontLegAmp  = THREE.MathUtils.degToRad(45);
  const backKneeAmp  = THREE.MathUtils.degToRad(60);
  const frontKneeAmp = THREE.MathUtils.degToRad(50);
  const spineAmp     = THREE.MathUtils.degToRad(28);
  const chestAmp     = THREE.MathUtils.degToRad(18);
  const tracks = [];
  const sideAxis = computeRigSideAxis(model);

  // Both fronts together, both backs together, L/R SYNCED within each
  // pair (no stagger). Backs lead fronts by a quarter stride so the
  // silhouette reads as "fronts reach -> backs reach -> fronts reach"
  // instead of both pairs doing the same thing at the same time.
  const legs = [
    ['thigh_L',    0.00, backLegAmp],
    ['thigh_R',    0.00, backLegAmp],
    ['shoulder_L', 0.25, frontLegAmp],
    ['shoulder_R', 0.25, frontLegAmp],
  ];
  for (const [bone, phase, legAmp] of legs) {
    const samples = [];
    for (let i = 0; i <= 8; i++) {
      const t = (i / 8) * dur;
      samples.push([t, sideAxis, Math.sin(2 * Math.PI * (i / 8 + phase)) * legAmp]);
    }
    const track = buildRotTrack(model, bone, samples);
    if (track) tracks.push(track);
  }
  // Knees (back) fold rearward: shin rotates toward tail so the heel
  // comes up toward the buttock. Negative sign.
  // Elbows (front) fold FORWARD: forearm rotates toward head so the
  // paw comes up toward the chest. Positive sign. Using the same
  // negative sign for both folded the front paws INTO the belly, which
  // is why the user saw "front legs bending into the stomach".
  const joints = [
    ['shin_L',      0.00, backKneeAmp,  -1],
    ['shin_R',      0.00, backKneeAmp,  -1],
    ['lower_arm_L', 0.25, frontKneeAmp, +1],
    ['lower_arm_R', 0.25, frontKneeAmp, +1],
  ];
  for (const [bone, phase, kneeAmp, sign] of joints) {
    const samples = [];
    for (let i = 0; i <= 8; i++) {
      const t = (i / 8) * dur;
      const s = Math.sin(2 * Math.PI * (i / 8 + phase));
      samples.push([t, sideAxis, sign * Math.max(0, s) * kneeAmp]);
    }
    const track = buildRotTrack(model, bone, samples);
    if (track) tracks.push(track);
  }
  // Spine arches up (gather) when legs tuck, extends (flat) when they
  // reach. Peak arch is roughly where legs are at their neutral midpoint
  // so the body silhouette looks "crouched" at mid-stride and stretched
  // at the start / end.
  for (const [bone, a] of [['spine_01', spineAmp], ['chest', chestAmp]]) {
    const s = [];
    for (let i = 0; i <= 8; i++) {
      const t = (i / 8) * dur;
      s.push([t, sideAxis, Math.cos(2 * Math.PI * i / 8) * a]);
    }
    const tr = buildRotTrack(model, bone, s);
    if (tr) tracks.push(tr);
  }
  // Head stabilization. Real cats (and dogs, and every quadruped with
  // a working vestibulo-ocular reflex) actively HOLD THEIR HEAD LEVEL
  // while the body pumps under them - they're looking at the prey /
  // target they're running toward, and a bobbing head is useless for
  // aiming a sprint. User reported the earlier version "moves the head
  // with the front legs, looks dumb".
  //
  // Mechanism: the body already pitches spineAmp + chestAmp degrees
  // down the chain. Counter-rotate the neck by exactly the negative of
  // that sum (split across neck_01 and neck_02) so the head's world
  // orientation stays approximately level while spine_01 and chest
  // still flex under it.
  const spineSum = spineAmp + chestAmp;
  for (const [bone, weight] of [['neck_01', 0.5], ['neck_02', 0.5]]) {
    const s = [];
    for (let i = 0; i <= 8; i++) {
      const t = (i / 8) * dur;
      s.push([t, sideAxis, -Math.cos(2 * Math.PI * i / 8) * spineSum * weight]);
    }
    const tr = buildRotTrack(model, bone, s);
    if (tr) tracks.push(tr);
  }
  return tracks.length ? new THREE.AnimationClip('run', dur, tracks) : null;
}
// Helper for animating a bone's LOCAL POSITION (as opposed to rotation).
// Used by layDown to translate the root bone toward the ground and by
// standUp to lift it back. Without this we can only animate rotations.
function buildPosTrack(model, boneName, samples /* [[t, [x,y,z]], ...] */) {
  const bone = findBone(model, boneName);
  if (!bone) return null;
  const times = []; const values = [];
  for (const [t, pos] of samples) { times.push(t); values.push(...pos); }
  return new THREE.VectorKeyframeTrack(`${bone.name}.position`, times, values);
}

// Read rest hip y-offset from the model. DROP values scale against this
// so the same clip works for cat (hips at 0.22) and dog (hips at 0.308)
// instead of being tuned for one species. If this function returns a
// default, clip will use cat proportions; best to call on a model that
// has a `hips` bone.
function restHipY(model) {
  const hips = findBone(model, 'hips');
  return hips ? hips.position.y : 0.22;
}

// Drop-fraction curve matching fold angles 85/-170/85 (cumulative 85 at
// thigh, -85 at shin, 0 at foot). With zero-x-offset leg bones of lengths
// 0.10 + 0.10 + 0.02, the leg reach at fold scale s is:
//   reach(s) = 0.20 * cos(85*s) + 0.02
// Drop = hipY - reach. Dividing by hipY gives scale-invariant fractions:
const DROP_FRAC_BY_SCALE = {
  0.0:  0.000,
  0.25: 0.064,
  0.5:  0.241,
  0.75: 0.509,
  1.0:  0.832
};
const KEY_SCALES = [0, 0.25, 0.5, 0.75, 1.0];
// Max-fold angles (reached at s=1.0). 85 instead of 75 gives a deeper
// sit crouch - hip drops to ~17% of rest height instead of ~27%.
const SIT_THIGH_DEG = 85;
const SIT_SHIN_DEG = -170;
const SIT_FOOT_DEG = 85;

function buildSitDownClip(model) {
  // Real cat/dog sit pose (anatomically informed):
  //
  // 1. Lumbar spine arches backward so the pelvis tips down while the
  //    thoracic spine stays relatively upright. lumbar_01 + lumbar_02
  //    each rotate -20 deg around Z (total -40 deg arch at the small-
  //    of-the-back). This is the SIGNATURE sit-arch: back curves into
  //    a C-shape with the apex at the lumbar region.
  //
  // 2. Back legs fold DEEP into a Z: thigh swings forward-down, shin
  //    swings backward from the knee, foot lays flat on the ground
  //    (hock pressed to floor). With 0.10 thigh + 0.10 shin, the fold
  //    can bring paws to ground when hips are at ~0.10 height.
  //
  // 3. Root drops so hips move from rest height (0.22) to sit height
  //    (~0.10). Spine_01's local position lifts by the same DROP so
  //    chest + shoulders + front legs stay at rest height - front paws
  //    stay planted, front legs stay vertical.
  //
  // 4. Neck+head tilt up so the cat is alert, not head-down.
  //
  // Animation is a one-shot (LoopOnce + clampWhenFinished) so the end
  // pose holds after the clip completes.
  // DROP scales with rest hip height so the same clip works for cat
  // (0.22 rig-units) and dog (0.308 rig-units). 0.80 factor was tuned
  // against the paw-contact test harness until both species land all
  // four paws on the ground.
  const hipY = restHipY(model);
  const DROP = hipY * 0.80;
  const dur = 1.3;
  const tracks = [];
  const sideAxis = computeRigSideAxis(model);
  const addRot = (bone, axis, endDeg) => {
    const t = buildRotTrack(model, bone, [[0, axis, 0], [dur, axis, THREE.MathUtils.degToRad(endDeg)]]);
    if (t) tracks.push(t);
  };

  // Deep pitch-fold of the back legs around the rig's side axis. Thigh
  // swings forward, shin folds back, foot rotates to flat. Tuned in
  // combination with DROP=hipY*0.80 so paws land at y~=0.
  addRot('thigh_L', sideAxis, SIT_THIGH_DEG); addRot('thigh_R', sideAxis, SIT_THIGH_DEG);
  addRot('shin_L',  sideAxis, SIT_SHIN_DEG);  addRot('shin_R',  sideAxis, SIT_SHIN_DEG);
  addRot('foot_L',  sideAxis, SIT_FOOT_DEG);  addRot('foot_R',  sideAxis, SIT_FOOT_DEG);

  addRot('neck_01', sideAxis, 10);
  addRot('neck_02', sideAxis, 10);
  addRot('head',    sideAxis, 8);

  // Lumbar arch commented out - it tips chest + front legs in ways that
  // make paws sink. Re-add once the compensation math is worked out.
  // TODO(anatomy): the sit-arch is visually important but requires more
  // careful compensation than a single spine_01 lift can provide.

  // Root drop follows a 5-keyframe non-linear curve that matches the
  // back-leg fold reach at each time point. Legs unfold linearly (scale
  // s = t), reach curve is cosine-based so root drop at t must equal
  // hipY * DROP_FRAC_BY_SCALE[s]. Without these intermediate keyframes
  // the root would drop linearly while leg reach shrinks non-linearly,
  // causing back paws to dip below ground at t=0.4 (measured 3-4cm
  // sink with 2-keyframe approach).
  const rootBone = findBone(model, 'root');
  if (rootBone) {
    const start = rootBone.position.toArray();
    const times = [];
    const values = [];
    for (const s of KEY_SCALES) {
      times.push(s * dur);
      values.push(start[0], start[1] - hipY * DROP_FRAC_BY_SCALE[s], start[2]);
    }
    const posTrack = new THREE.VectorKeyframeTrack(`${rootBone.name}.position`, times, values);
    tracks.push(posTrack);
  }
  // Spine lift: distribute DROP compensation across spine bones so each
  // rises progressively (smooth arch instead of a step). Uses matching
  // 5-keyframe curve so the spine rise syncs with root fall.
  // Share weights across 8 back bones. Sums to 1.0. Slightly more
  // weight on the lumbar + lower-thoracic where the sit-arch apex is
  // anatomically located.
  const SHARES = {
    lumbar_01: 0.15, lumbar_02: 0.18,
    spine_01:  0.18, upper_back_01: 0.14, upper_back_02: 0.12, upper_back_03: 0.10,
    chest:     0.13
  };
  for (const [boneName, share] of Object.entries(SHARES)) {
    const bone = findBone(model, boneName);
    if (!bone) continue;
    const start = bone.position.toArray();
    const times = [];
    const values = [];
    for (const s of KEY_SCALES) {
      times.push(s * dur);
      values.push(start[0], start[1] + hipY * DROP_FRAC_BY_SCALE[s] * share, start[2]);
    }
    tracks.push(new THREE.VectorKeyframeTrack(`${bone.name}.position`, times, values));
  }
  return tracks.length ? new THREE.AnimationClip('sitDown', dur, tracks) : null;
}

function buildLayDownClip(model) {
  // Sphinx/loaf lay-down: all four legs fold identically under the
  // body so front and back vertical reach match. Body drops uniformly
  // (no spine compensation - unlike sit where front stays put).
  //
  // Same fold angles as sit legs, applied to BOTH front and back chains:
  //   upper segment: +75 deg (swings forward)
  //   middle relative: -150 deg (folds back)
  //   end relative: +75 deg (paw flat)
  // This gives both chains equal vertical reach so DROP is the same
  // for both ends - no tilt.
  //
  // DROP same as sit (hipY * 0.80) since the fold-reach is identical.
  const hipY = restHipY(model);
  const DROP = hipY * 0.80;
  const dur = 1.6;
  const tracks = [];
  const sideAxis = computeRigSideAxis(model);
  const addRot = (bone, axis, endDeg) => {
    const t = buildRotTrack(model, bone, [[0, axis, 0], [dur, axis, THREE.MathUtils.degToRad(endDeg)]]);
    if (t) tracks.push(t);
  };
  // Back-leg pitch-fold around the rig's side axis.
  addRot('thigh_L', sideAxis, SIT_THIGH_DEG); addRot('thigh_R', sideAxis, SIT_THIGH_DEG);
  addRot('shin_L',  sideAxis, SIT_SHIN_DEG);  addRot('shin_R',  sideAxis, SIT_SHIN_DEG);
  addRot('foot_L',  sideAxis, SIT_FOOT_DEG);  addRot('foot_R',  sideAxis, SIT_FOOT_DEG);
  // Front-leg fold identical to back. Front legs share bone lengths with
  // back (0.10/0.10/0.02), so the reach curves match and front/back paws
  // stay in sync.
  addRot('shoulder_L',  sideAxis, SIT_THIGH_DEG); addRot('shoulder_R',  sideAxis, SIT_THIGH_DEG);
  addRot('upper_arm_L', sideAxis, SIT_SHIN_DEG);  addRot('upper_arm_R', sideAxis, SIT_SHIN_DEG);
  addRot('lower_arm_L', sideAxis, SIT_FOOT_DEG);  addRot('lower_arm_R', sideAxis, SIT_FOOT_DEG);
  addRot('neck_01', sideAxis, 25);
  addRot('neck_02', sideAxis, 20);
  addRot('head',    sideAxis, 15);
  // Tail wraps around body (pitch around side axis).
  addRot('tail_01', sideAxis, -20);
  addRot('tail_02', sideAxis, -30);
  // Body drops along a 5-keyframe non-linear curve matching the back
  // leg-reach progression. No spine compensation - both ends drop
  // uniformly. Front legs fold identically to back (see rotations
  // above), so their reach matches and front paws also stay grounded.
  const rootBone = findBone(model, 'root');
  if (rootBone) {
    const start = rootBone.position.toArray();
    const times = [];
    const values = [];
    for (const s of KEY_SCALES) {
      times.push(s * dur);
      values.push(start[0], start[1] - hipY * DROP_FRAC_BY_SCALE[s], start[2]);
    }
    tracks.push(new THREE.VectorKeyframeTrack(`${rootBone.name}.position`, times, values));
  }
  return tracks.length ? new THREE.AnimationClip('layDown', dur, tracks) : null;
}

// Two stand-up variants: one for when the cat is sitting, one for when
// it's laying down. Sit-stand un-folds only the back legs (front legs
// were already planted) and un-lifts the compensating spine. Lay-stand
// un-folds BOTH front and back legs (both were folded in lay) with no
// spine compensation (lay had the whole body low, not just hips).
// Different starting poses, different final motion, shared shape via
// `fromLay` flag.
function buildStandUpClipFrom(model, fromLay) {
  const hipY = restHipY(model);
  const dur = 1.3;
  const tracks = [];
  const sideAxis = computeRigSideAxis(model);
  const rad = (d) => THREE.MathUtils.degToRad(d);
  const addRot = (bone, axis, keyframes) => {
    const t = buildRotTrack(model, bone, keyframes.map(([f, a]) => [f * dur, axis, rad(a)]));
    if (t) tracks.push(t);
  };

  // Back legs unfold from sit-fold angles to zero. Same for both variants.
  addRot('thigh_L', sideAxis, [[0, SIT_THIGH_DEG], [1.0, 0]]);
  addRot('thigh_R', sideAxis, [[0, SIT_THIGH_DEG], [1.0, 0]]);
  addRot('shin_L',  sideAxis, [[0, SIT_SHIN_DEG],  [1.0, 0]]);
  addRot('shin_R',  sideAxis, [[0, SIT_SHIN_DEG],  [1.0, 0]]);
  addRot('foot_L',  sideAxis, [[0, SIT_FOOT_DEG],  [1.0, 0]]);
  addRot('foot_R',  sideAxis, [[0, SIT_FOOT_DEG],  [1.0, 0]]);

  if (fromLay) {
    // Front legs unfold too - they were folded in lay down.
    addRot('shoulder_L',  sideAxis, [[0, SIT_THIGH_DEG], [1.0, 0]]);
    addRot('shoulder_R',  sideAxis, [[0, SIT_THIGH_DEG], [1.0, 0]]);
    addRot('upper_arm_L', sideAxis, [[0, SIT_SHIN_DEG],  [1.0, 0]]);
    addRot('upper_arm_R', sideAxis, [[0, SIT_SHIN_DEG],  [1.0, 0]]);
    addRot('lower_arm_L', sideAxis, [[0, SIT_FOOT_DEG],  [1.0, 0]]);
    addRot('lower_arm_R', sideAxis, [[0, SIT_FOOT_DEG],  [1.0, 0]]);
    // Neck un-curls from lay's deeper bend (25/20/15) not sit's (10/10/8).
    addRot('neck_01', sideAxis, [[0, 25], [1.0, 0]]);
    addRot('neck_02', sideAxis, [[0, 20], [1.0, 0]]);
    addRot('head',    sideAxis, [[0, 15], [1.0, 0]]);
  } else {
    // Neck un-curls from sit's alert angles.
    addRot('neck_01', sideAxis, [[0, 10], [1.0, 0]]);
    addRot('neck_02', sideAxis, [[0, 10], [1.0, 0]]);
    addRot('head',    sideAxis, [[0,  8], [1.0, 0]]);
  }

  // Root rises: 5 keyframes on the same reach curve as sit/lay, reversed.
  const rootBone = findBone(model, 'root');
  if (rootBone) {
    const rest = rootBone.position.toArray();
    const entries = KEY_SCALES.map(s => ({
      t: (1 - s) * dur,
      v: [rest[0], rest[1] - hipY * DROP_FRAC_BY_SCALE[s], rest[2]]
    })).sort((a, b) => a.t - b.t);
    tracks.push(new THREE.VectorKeyframeTrack(`${rootBone.name}.position`, entries.map(e => e.t), entries.flatMap(e => e.v)));
  }

  // Spine un-lift - ONLY for fromSit. In lay there was no spine lift
  // (whole body dropped uniformly), so stand-from-lay doesn't need to
  // un-lift anything.
  if (!fromLay) {
    const SHARES = {
      lumbar_01: 0.15, lumbar_02: 0.18,
      spine_01:  0.18, upper_back_01: 0.14, upper_back_02: 0.12, upper_back_03: 0.10,
      chest:     0.13
    };
    for (const [boneName, share] of Object.entries(SHARES)) {
      const bone = findBone(model, boneName);
      if (!bone) continue;
      const rest = bone.position.toArray();
      const entries = KEY_SCALES.map(s => ({
        t: (1 - s) * dur,
        v: [rest[0], rest[1] + hipY * DROP_FRAC_BY_SCALE[s] * share, rest[2]]
      })).sort((a, b) => a.t - b.t);
      tracks.push(new THREE.VectorKeyframeTrack(`${bone.name}.position`, entries.map(e => e.t), entries.flatMap(e => e.v)));
    }
  }
  return tracks.length ? new THREE.AnimationClip(fromLay ? 'standUpFromLay' : 'standUpFromSit', dur, tracks) : null;
}

function buildStandUpFromSitClip(model) { return buildStandUpClipFrom(model, false); }
function buildStandUpFromLayClip(model) { return buildStandUpClipFrom(model, true); }
// Back-compat: default standUp uses the from-sit variant.
function buildStandUpClip(model) { return buildStandUpFromSitClip(model); }

// layDownFromSit: sit -> lay transition. The cat is already sitting
// (back legs folded, spine lifted for upright torso); only the front
// legs fold down and the torso drops onto the belly. Back legs are
// INTENTIONALLY NOT animated so the mixer doesn't touch their sit-
// clamped values - they stay folded throughout. Without this variant
// the default layDown clip animates all legs from T-pose, causing
// the cat to briefly STAND UP (back unfolds to T-pose) mid-transition
// before re-folding - the bug the user reported.
function buildLayDownFromSitClip(model) {
  const hipY = restHipY(model);
  const dur = 1.3;
  const tracks = [];
  const sideAxis = computeRigSideAxis(model);
  const rad = (d) => THREE.MathUtils.degToRad(d);
  const add = (bone, endDeg) => {
    const t = buildRotTrack(model, bone, [[0, sideAxis, 0], [dur, sideAxis, rad(endDeg)]]);
    if (t) tracks.push(t);
  };
  // Front legs fold from straight (0) to lay-fold angles (same as back
  // sit angles for symmetric reach).
  add('shoulder_L',  SIT_THIGH_DEG); add('shoulder_R',  SIT_THIGH_DEG);
  add('upper_arm_L', SIT_SHIN_DEG);  add('upper_arm_R', SIT_SHIN_DEG);
  add('lower_arm_L', SIT_FOOT_DEG);  add('lower_arm_R', SIT_FOOT_DEG);
  // Neck curls further down as head drops toward folded front paws.
  // sit-end neck = 10/10/8; lay-end = 25/20/15. Animate the delta.
  const addKF = (bone, fromDeg, toDeg) => {
    const t = buildRotTrack(model, bone, [[0, sideAxis, rad(fromDeg)], [dur, sideAxis, rad(toDeg)]]);
    if (t) tracks.push(t);
  };
  addKF('neck_01', 10, 25);
  addKF('neck_02', 10, 20);
  addKF('head',     8, 15);

  // Spine un-lift: sit had spine bones lifted by hipY * 0.832 * SHARE.
  // Lay has no spine lift. Animate lifted -> rest so chest drops with
  // the body (the front end was being held up by the compensation; now
  // it lowers to match the back).
  const TOTAL_FRAC = DROP_FRAC_BY_SCALE[1.0]; // 0.832
  const SHARES = {
    lumbar_01: 0.15, lumbar_02: 0.18,
    spine_01:  0.18, upper_back_01: 0.14, upper_back_02: 0.12, upper_back_03: 0.10,
    chest:     0.13
  };
  for (const [boneName, share] of Object.entries(SHARES)) {
    const bone = findBone(model, boneName);
    if (!bone) continue;
    const rest = bone.position.toArray();
    const lifted = [rest[0], rest[1] + hipY * TOTAL_FRAC * share, rest[2]];
    tracks.push(new THREE.VectorKeyframeTrack(`${bone.name}.position`, [0, dur], [...lifted, ...rest]));
  }
  // NOTE: no root position track - sit clamped root at -hipY*0.832 and
  // lay needs root at the same depth, so we leave it where sit left it.
  // NOTE: no back-leg tracks - they stay at sit-clamped values through
  // the transition. This is THE fix for the user's reported bug.
  return tracks.length ? new THREE.AnimationClip('layDownFromSit', dur, tracks) : null;
}

function rebuildClips() {
  if (!currentModel) { clipCache = null; return; }
  clipCache = {
    idle:           buildIdleClip(currentModel),
    sitDown:        buildSitDownClip(currentModel),
    layDown:        buildLayDownClip(currentModel),
    layDownFromSit: buildLayDownFromSitClip(currentModel),
    standUpFromSit: buildStandUpFromSitClip(currentModel),
    standUpFromLay: buildStandUpFromLayClip(currentModel),
    walk:           buildWalkClip(currentModel),
    run:            buildRunClip(currentModel)
  };
}

function updateAnimButtonStates() {
  // Only touch animation-clip buttons (those have data-anim). Skipping
  // the generic selector so we don't clobber the Pause button's own
  // tooltip or mess with its classes.
  document.querySelectorAll('#animGroup button[data-anim]').forEach(btn => {
    const name = btn.dataset.anim;
    const cov = currentReport?.animCoverage?.[name];
    btn.classList.toggle('incomplete', cov && !cov.complete);
    btn.title = cov
      ? `${cov.present}/${cov.required} required bones present${cov.missing.length ? ' - missing: ' + cov.missing.join(', ') : ''}`
      : '';
  });
}

// Context-aware routing for the "Stand Up" button. The UI always shows
// one physical button; clicking it picks the appropriate anim based on
// the cat's CURRENT state:
//   * sitting        -> standUpFromSit (reverse of sit: unfold back legs
//                                        + un-lift spine)
//   * lying down     -> standUpFromLay (unfold all 4 legs + neck, no
//                                        spine un-lift)
//   * walking/running -> "Stand Still": crossfade to idle immediately
//   * already idle   -> no-op
// Returns the actual anim name that will be played, so the UI can
// reflect button label swaps.
function resolveStandAction(fromAnim) {
  if (fromAnim === 'sitDown') return 'standUpFromSit';
  if (fromAnim === 'layDown' || fromAnim === 'layDownFromSit') return 'standUpFromLay';
  if (fromAnim === 'walk' || fromAnim === 'run') return 'idle';
  return 'idle';
}

// Lay-Down routing: transitioning FROM sit -> lay should keep the back
// legs folded instead of unfolding through T-pose (the bug the user
// reported). From any other state, use the regular layDown clip which
// folds all four legs from scratch.
function resolveLayAction(fromAnim) {
  if (fromAnim === 'sitDown') return 'layDownFromSit';
  return 'layDown';
}

function playAnim(name) {
  // Raw mode autoswap: animations require our canonical bone names, which
  // only the Blender-rigged GLBs have. Meshy's raw cats either have no
  // bones or a different bone naming scheme, so our clips come out with
  // zero tracks and the cat looks frozen. Rather than silently no-op,
  // flip to rigged mode, reload, and queue the requested animation. Idle
  // does NOT trigger the swap (lets the user watch the raw mesh at rest).
  // Anything else (walk/run/sit/lay/standUp) triggers the swap.
  const asset = state.selectedId ? getAsset(state.selectedId) : null;
  const needsRig = name !== 'idle';
  if (asset && asset.kind === 'cat' && needsRig && !state.toggles.rigged && assetSupportsRigged(asset)) {
    state.toggles.rigged = true;
    saveState();
    updateSourceButtons();
    currentAnim = name; // loadAsset -> rebuildClips -> playAnim(currentAnim)
    toast(`Switched to rigged view (${name} needs the skeleton). Click Raw to see the static mesh again.`);
    loadAsset(asset);
    return;
  }
  if (!mixer || !clipCache) return;
  // Context-aware routing: a 'standUp' request is dispatched based on
  // currentAnim. For other names, play directly.
  let resolvedName = name;
  if (name === 'standUp') resolvedName = resolveStandAction(currentAnim);
  if (name === 'layDown') resolvedName = resolveLayAction(currentAnim);

  const clip = clipCache[resolvedName];
  const cov = currentReport?.animCoverage?.[resolvedName];
  if (!clip) {
    const miss = cov?.missing?.length ? `missing bones: ${cov.missing.join(', ')}` : 'no matching bones';
    toast(`${resolvedName} clip unavailable - ${miss}`);
    console.warn(`[anim] clip "${resolvedName}" could not be built. Missing: ${cov?.missing?.join(', ') || '(all)'}`);
    return;
  }
  if (cov && !cov.complete) {
    console.warn(`[anim] playing "${resolvedName}" with degraded rig - missing: ${cov.missing.join(', ')}`);
  }
  const action = mixer.clipAction(clip);
  action.reset();
  const isOneShot = resolvedName === 'sitDown' || resolvedName === 'layDown'
                 || resolvedName === 'layDownFromSit'
                 || resolvedName === 'standUpFromSit' || resolvedName === 'standUpFromLay';
  if (isOneShot) {
    action.setLoop(THREE.LoopOnce, 1); action.clampWhenFinished = true;
  } else {
    action.setLoop(THREE.LoopRepeat, Infinity); action.clampWhenFinished = false;
  }
  if (activeAction && activeAction !== action) action.crossFadeFrom(activeAction, 0.25, false);
  action.play();
  activeAction = action; currentAnim = resolvedName;
  // UI button state: highlight the button user clicked (by data-anim).
  document.querySelectorAll('#animGroup button').forEach(b => { b.classList.toggle('active', b.dataset.anim === name); });
  updateStandUpLabel();
}

// Swap the stand-up button label based on current state. "Stand Up"
// when the cat is sitting/laying, "Stand Still" when it's walking/
// running, disabled-looking when already idle.
function updateStandUpLabel() {
  const btn = document.querySelector('#animGroup button[data-anim="standUp"]');
  if (!btn) return;
  if (currentAnim === 'walk' || currentAnim === 'run') {
    btn.textContent = 'Stand Still';
    btn.title = 'Stop walking/running and return to idle';
  } else if (currentAnim === 'sitDown' || currentAnim === 'layDown') {
    btn.textContent = 'Stand Up';
    btn.title = currentAnim === 'sitDown' ? 'Stand up from sit' : 'Stand up from lay';
  } else {
    btn.textContent = 'Stand Up';
    btn.title = 'Already standing';
  }
}

// Pause state for the animation mixer. When paused, we still advance
// animClock so that `getDelta()` returns the elapsed time each frame,
// but we feed 0 to `mixer.update()` so bone quaternions stay exactly
// where they were when the user hit Pause. This lets the user orbit
// the camera, toggle display options, or grab a screenshot without
// the cat moving out from under them. Resuming simply flips the flag
// and the mixer continues from the same t.
let animPaused = false;

function animate() {
  requestAnimationFrame(animate);
  controls.autoRotate = state.toggles.autoRotate;
  controls.update();
  const delta = animClock.getDelta();
  if (mixer) mixer.update(animPaused ? 0 : delta);
  renderer.render(scene, camera);
}
animate();

function setAnimPaused(paused) {
  animPaused = paused;
  const btn = document.getElementById('btnPauseAnim');
  if (btn) {
    btn.textContent = paused ? 'Resume' : 'Pause';
    btn.classList.toggle('active', paused);
  }
}
const btnPauseAnim = document.getElementById('btnPauseAnim');
if (btnPauseAnim) btnPauseAnim.onclick = () => setAnimPaused(!animPaused);

// Any animation-button click should resume playback - you don't want
// the pause flag to outlast your explicit "play walk" request.
document.querySelectorAll('#animGroup button[data-anim]').forEach(btn => {
  btn.addEventListener('click', () => { if (animPaused) setAnimPaused(false); }, true);
});

// ===========================================================================
// GLB LOADING
// ===========================================================================
const gltfLoader = new GLTFLoader();

// Load a canonical rig (no GLB - built programmatically). Reuses the same
// animation mixer / sandbox plumbing by wrapping the bone hierarchy in a
// Group and stashing a minimal diagnostic report so the right panel has
// something to render.
function loadCanonicalRig(asset) {
  clearModel();
  document.getElementById('viewerEmpty').style.display = 'none';
  const layout = asset.species === 'cat' ? CAT_BONE_LAYOUT : DOG_BONE_LAYOUT;
  const { rootBone, bones } = buildSkeletonHierarchy(layout);

  // Wrap in a Group so scene management is identical to the GLB path.
  currentModel = new THREE.Group();
  currentModel.name = `canonical_${asset.species}`;
  currentModel.add(rootBone);
  addJointMarkers(bones, scene);

  // Normalize scale so the skeleton fills the viewer the same way meshes do.
  const box = new THREE.Box3().setFromObject(currentModel);
  const size = box.getSize(new THREE.Vector3());
  const scale = 1.2 / Math.max(size.x, size.y, size.z, 0.001);
  currentModel.scale.setScalar(scale);
  box.setFromObject(currentModel);
  const center = box.getCenter(new THREE.Vector3());
  currentModel.position.sub(new THREE.Vector3(center.x, box.min.y, center.z));
  scene.add(currentModel);

  // Always-on skeleton helper for rig view (the whole point is to see bones).
  currentSkeletonHelper = new THREE.SkeletonHelper(currentModel);
  currentSkeletonHelper.material.linewidth = 3;
  currentSkeletonHelper.visible = true;
  scene.add(currentSkeletonHelper);

  document.getElementById('statusFile').textContent = `canonical ${asset.species} rig (procedural, no mesh)`;
  document.getElementById('statusMeta').textContent =
    `${Object.keys(bones).length} bones - 0 mesh - programmatic`;

  // Fabricate a report object so renderDetails has the same shape to render
  // against. "source: rigged" keeps the anim-compatibility grid visible.
  const boneList = Object.values(bones).map(b => ({
    name: b.name, parent: b.parent?.name, pos: b.position.toArray().map(v => +v.toFixed(3))
  }));
  const foundNames = new Set(boneList.map(b => b.name));
  const missing = EXPECTED_BONES_CAT.filter(b => !foundNames.has(b));
  const animCoverage = {};
  for (const [anim, req] of Object.entries(ANIM_REQUIREMENTS)) {
    const missForAnim = req.filter(b => !foundNames.has(b));
    animCoverage[anim] = { required: req.length, present: req.length - missForAnim.length, missing: missForAnim, complete: missForAnim.length === 0 };
  }
  currentReport = {
    expected: EXPECTED_BONES_CAT.length,
    found: boneList.length,
    coveredExpected: EXPECTED_BONES_CAT.length - missing.length,
    missing, extras: [], bones: boneList,
    skinnedMeshes: [], skinnedVertexCount: 0,
    unskinnedMeshCount: 0, unskinnedVertexCount: 0,
    bbox: { x: +size.x.toFixed(3), y: +size.y.toFixed(3), z: +size.z.toFixed(3) },
    poseScore: 0, poseHeuristic: 'canonical T-pose',
    bakedClips: [], animCoverage,
    source: 'rigged', sourceUrl: `(procedural ${asset.species})`
  };
  logDiagnosis(asset.id, currentReport.sourceUrl, currentReport);
  renderDetails();

  // Wire up the animation mixer. Since clips target bones by name and our
  // bones match the Blender rig's names, the same procedural clips work.
  mixer = new THREE.AnimationMixer(currentModel);
  rebuildClips();
  animClock.getDelta();
  updateAnimButtonStates();
  playAnim(currentAnim || 'idle');
}

function loadAsset(asset) {
  // Canonical rigs bypass the GLB loader - they're built in-browser from
  // the CAT_BONE_LAYOUT / DOG_BONE_LAYOUT tables above.
  if (asset.kind === 'rig') { loadCanonicalRig(asset); return; }

  const url = pathFor(asset, state.toggles.rigged && assetSupportsRigged(asset));
  document.getElementById('viewerEmpty').style.display = 'none';
  document.getElementById('statusFile').textContent = url;

  gltfLoader.load(url, (gltf) => {
    clearModel();
    currentGltf = gltf;
    currentModel = gltf.scene;

    applyWireframe(currentModel, state.toggles.wireframe);
    if (state.toggles.weights) applyWeightViz(currentModel, true);

    // Propagate world transforms through the scene graph BEFORE measuring
    // the bbox. For SkinnedMesh children, three.js's Box3.setFromObject
    // calls SkinnedMesh.computeBoundingBox(), which runs each vertex
    // through applyBoneTransform using bone.matrixWorld. If we skip this
    // update the bone world matrices are stale-identity and the skinned
    // bbox comes out shifted (user-reported symptom: rigged cat rendered
    // with its bottom half buried below the ground disc even though the
    // raw-mesh view of the same GLB sits correctly on top of it). Raw
    // Mesh children use geometry.boundingBox directly and don't need
    // this, which is why only the rigged side was broken.
    currentModel.updateMatrixWorld(true);

    // Normalize size. Props vary wildly (a campfire vs a 491 MB Ancient Oak
    // are off by >10x) so fit-to-1.2m is the only way everything fills the
    // viewer consistently.
    const box = new THREE.Box3().setFromObject(currentModel);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const scale = 1.2 / Math.max(size.x, size.y, size.z);
    currentModel.scale.setScalar(scale);
    currentModel.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);
    scene.add(currentModel);

    currentSkeletonHelper = new THREE.SkeletonHelper(currentModel);
    currentSkeletonHelper.material.linewidth = 2;
    currentSkeletonHelper.visible = state.toggles.skeleton;
    scene.add(currentSkeletonHelper);

    const boneCount = countBones(currentModel);
    const meshCount = countMeshes(currentModel);
    document.getElementById('statusMeta').textContent =
      `${boneCount} bones - ${meshCount} mesh - ${(size.x).toFixed(2)}x${(size.y).toFixed(2)}x${(size.z).toFixed(2)}m`;

    // Diagnostics apply only to cats. Dogs/props skip - the report section
    // in the right panel checks currentReport to know whether to render.
    // We also stash the source type (raw vs rigged) on the report so the
    // renderer can branch: raw Meshy outputs have ZERO bones by design (the
    // "Rigged T-pose" prompt phrasing is aspirational - Meshy doesn't
    // actually auto-rig cats), so comparing them against our 26 expected
    // Blender bone names would produce a uniformly red report that looks
    // like catastrophe instead of "this is the pre-rig source."
    if (asset.kind === 'cat') {
      currentReport = diagnoseRig(currentModel, currentGltf);
      currentReport.source = (state.toggles.rigged && assetSupportsRigged(asset)) ? 'rigged' : 'raw';
      currentReport.sourceUrl = url;
      logDiagnosis(asset.id, url, currentReport);
    } else {
      currentReport = null;
    }
    renderDetails();

    // Animations apply only to cats with bones. Build the mixer anyway so
    // toggling to a dog/prop doesn't leave a stale mixer pointing at the
    // previous cat.
    mixer = new THREE.AnimationMixer(currentModel);
    if (asset.kind === 'cat') {
      rebuildClips();
      animClock.getDelta();
      updateAnimButtonStates();
      playAnim(currentAnim || 'idle');
    } else {
      // Dogs/props: no animations. Clear the highlight so no button looks active.
      document.querySelectorAll('#animGroup button').forEach(b => b.classList.remove('active'));
    }
  }, undefined, (err) => {
    console.error('GLTF load failed:', url, err);
    document.getElementById('statusFile').textContent = `LOAD FAILED: ${url}`;
  });
}

function applyWireframe(root, on) {
  root.traverse(n => {
    if (n.isMesh && n.material) {
      const mats = Array.isArray(n.material) ? n.material : [n.material];
      for (const m of mats) m.wireframe = on;
    }
  });
}
function countBones(root) { let c = 0; root.traverse(n => { if (n.isBone) c++; }); return c; }
function countMeshes(root) { let c = 0; root.traverse(n => { if (n.isMesh) c++; }); return c; }
